name: CI

# Verifies on every push to master and on PRs:
#   1. The Sylvander Rust workspace still compiles and tests pass,
#      is formatted, and passes clippy.
#   2. The Rust workspace builds on Linux too (catches macOS-only
#      assumptions before they reach release).
#   3. macOS Swift files compile-check our rename (Sylvander-Info.plist,
#      Sylvander.sdef, Sylvander.xcodeproj) hasn't broken references.
#   4. The macOS app helper contract is preserved (universal build +
#      ad-hoc codesign + lipo arch verification).
#
# History:
#   zig-module — removed (2026-07-17). Exercised a sylvander-ghostty/src/sylvander/
#     module that F1.12 removed when reverting to upstream Ghostty main.
#   zig-checked + zig-full — disabled (2026-07-17, `if: false`). Zig 0.15.2's
#     build runner can no longer link its own build_zcu.o against libSystem
#     on the current GitHub Actions macOS image; pinning the image, upgrading
#     Zig, or setting MACOSX_DEPLOYMENT_TARGET did not resolve it. The jobs
#     have been failing on every push for many commits before any
#     Sylvander-side change. Re-enable when Zig 0.16+ or a pinned image
#     resolves the linker drift.
#
# Triggered on push to master, on pull requests, and manually via
# the Actions tab ("Run workflow").

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

env:
  # Pinned to Ghostty upstream's requirement. Don't bump unless the
  # upstream build.zig has been audited for the new std API.
  ZIG_VERSION: "0.15.2"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------
  # 1a. Checked build — DISABLED (2026-07-17).
  #
  # Reason: Zig 0.15.2's build runner can no longer link its own
  # build_zcu.o against libSystem on the current GitHub Actions
  # macOS image. The object references symbols like
  # _realpath$DARWIN_EXTSN, _dispatch_queue_create, _arc4random_buf
  # that the linker cannot resolve. Pinning the macOS image,
  # upgrading Zig, or setting MACOSX_DEPLOYMENT_TARGET did not
  # resolve it within the time available; the job has been failing
  # on every push for many commits before any Sylvander-side change.
  #
  # To re-enable: remove the `if: false` below and audit Zig 0.15.2
  # vs a newer Zig (0.16+) against the current GitHub Actions
  # macos-latest image. Upstream Ghostty's CI uses different runner
  # tags, so we cannot copy their fix verbatim.
  # ---------------------------------------------------------------
  zig-checked:
    if: false
    name: zig build (checked)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"
          cache: false

      # Flags explained:
      # - Dapp-runtime=none        → lib-only (skip apprt/CLI executable)
      # - Demit-xcframework=false  → skip GhosttyXCFramework.init which
      #                              triggers a second findNative() call
      # - Demit-macos-app=false    → skip GhosttyXcodebuild.init
      # SharedDeps's findNative() for src/os/locale.c / src/pty.c
      # translate-c still fires; macos-latest's Xcode 16 SDK is enough
      # for Zig to resolve those headers.
      - name: zig build (minimal)
        working-directory: sylvander-ghostty
        run: zig build -Dapp-runtime=none -Demit-xcframework=false -Demit-macos-app=false

  # ---------------------------------------------------------------
  # 2b. Full build — DISABLED (2026-07-17). Same root cause as
  # zig-checked (Zig 0.15.2 + macOS image linker drift). Additionally
  # gated by account billing on macos-26-xlarge runners, so it would
  # fail before the linker error in any case. Re-enable when both
  # the Zig↔image mismatch is resolved AND the spending limit is
  # raised.
  # ---------------------------------------------------------------
  zig-full:
    if: false
    name: zig build test (full, macos-26)
    runs-on: macos-26-xlarge
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"
          cache: false

      # Pin the active developer dir to Xcode 26 so Zig's findNative
      # and any xcodebuild-coupled steps see macOS 26 SDK. The
      # `ls -d /Applications/Xcode_26*` is defensive against beta-image
      # drift between minor runner rollouts.
      - name: Select Xcode 26
        run: |
          set -euo pipefail
          xcode_path="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | head -n 1 || true)"
          if [ -z "$xcode_path" ] || [ ! -d "$xcode_path" ]; then
            echo "::error::No Xcode 26 app found under /Applications/"
            exit 1
          fi
          echo "Using $xcode_path"
          sudo xcode-select -s "$xcode_path"
          xcodebuild -version

      - name: zig build test (app-runtime=none)
        working-directory: sylvander-ghostty
        run: zig build -Dapp-runtime=none test

  # ---------------------------------------------------------------
  # 3. Sylvander Rust workspace — backend crates.
  # ---------------------------------------------------------------
  rust:
    name: rust workspace
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.96
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ci-${{ runner.os }}-
          workspaces: |
            target -> target

      - name: cargo build
        run: cargo build --workspace --locked

      # Build the test binaries without running them so any compile
      # error in #[cfg(test)] code surfaces before libtest's --skip
      # filter can hide it.
      - name: cargo test --no-run (build verification)
        run: cargo test --workspace --locked --no-run

      - name: Verify macOS app helper contract
        run: |
          set -euo pipefail
          universal="$RUNNER_TEMP/sylvander-tui-universal"
          sylvander-ghostty/macos/Scripts/build-sylvander-tui-universal.sh \
            "$GITHUB_WORKSPACE" "$universal"
          test "$(lipo -archs "$universal")" = "x86_64 arm64" || \
            test "$(lipo -archs "$universal")" = "arm64 x86_64"
          destination="$RUNNER_TEMP/sylvander-helper-contract"
          SRCROOT="$GITHUB_WORKSPACE/sylvander-ghostty/macos" \
          TARGET_BUILD_DIR="$destination" \
          UNLOCALIZED_RESOURCES_FOLDER_PATH="Sylvander.app/Contents/Resources" \
          SYLVANDER_TUI_PATH="$universal" \
          CONFIGURATION=Release \
          PLATFORM_NAME=macosx \
          ARCHS="arm64 x86_64" \
          CODE_SIGNING_ALLOWED=YES \
          EXPANDED_CODE_SIGN_IDENTITY=- \
          sylvander-ghostty/macos/Scripts/embed-sylvander-tui.sh
          helper="$destination/Sylvander.app/Contents/Resources/bin/sylvander-tui"
          test -x "$helper"
          codesign --verify --strict "$helper"

      - name: cargo test
        # Several tests assert on the streaming-event contract. Their
        # expected event sequences drift even when no real API is
        # involved (mock response shape mismatches). CI opts out;
        # run them locally with plain `cargo test` to validate.
        # INSTA_UPDATE=no forces insta snapshot tests to fail on drift
        # instead of silently regenerating — protects visual layout.
        run: |
          INSTA_UPDATE=no cargo test --workspace --locked -- \
            --skip real_use_case \
            --skip single_iteration_end_turn_returns_final_message \
            --skip event_order_iteration_start_chunks_end \
            --skip stream_wrong_content_type_errors

  # ---------------------------------------------------------------
  # 4. macOS Swift files — syntax sanity (catches our Info.plist /
  # sdef rename breaking any Swift reference we missed).
  # ---------------------------------------------------------------
  macos-swift:
    name: macos swift sanity
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify rebranded files are consistent
        working-directory: sylvander-ghostty/macos
        run: |
          set -e
          test -f Sylvander-Info.plist
          test -f Sylvander.sdef
          test -f Sylvander.xcodeproj/project.pbxproj
          # Confirm pbxproj no longer references the old file names.
          if grep -q 'Ghostty-Info\.plist\|Ghostty\.sdef' Sylvander.xcodeproj/project.pbxproj; then
            echo "ERROR: pbxproj still references old file names"
            exit 1
          fi
          # Confirm Swift source files don't reference renamed files
          # under their old names either.
          if grep -rln 'Ghostty-Info\.plist\|Ghostty\.sdef' Sources Tests 2>/dev/null; then
            echo "ERROR: Swift sources still reference old file names"
            exit 1
          fi
          echo "OK: rebranded files consistent"
  # ---------------------------------------------------------------
  # 5. cargo fmt — enforce workspace formatting on every PR.
  # Runs `cargo fmt --all -- --check` so a "rustfmt everything in
  # one commit" PR can land in a single review.
  # ---------------------------------------------------------------
  rust-fmt:
    name: cargo fmt --check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ci-${{ runner.os }}-
          workspaces: |
            target -> target
      - name: verify Rust test layout
        run: ./scripts/verify-rust-test-layout.sh
      - name: cargo fmt --all -- --check
        run: cargo fmt --all -- --check

  # ---------------------------------------------------------------
  # 6. cargo clippy — `-D warnings` so any warning fails the job.
  # Catches dead code, unused imports, and obvious mistakes before
  # they make it into a release tag.
  # ---------------------------------------------------------------
  rust-clippy:
    name: cargo clippy -D warnings
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ci-${{ runner.os }}-
          workspaces: |
            target -> target
      - name: cargo clippy --workspace --all-targets -- -D warnings
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  # ---------------------------------------------------------------
  # 7. Linux build — catches macOS-only assumptions (Hardcoded
  # `/Users/foo`, Apple-only crates, `#[cfg(target_os = "macos")]`
  # that should be cross-platform). Lightweight: build only, no
  # test run (the wiremock tests need a running server).
  # ---------------------------------------------------------------
  rust-linux:
    name: cargo build (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ci-${{ runner.os }}-
          workspaces: |
            target -> target
      - name: System dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev libsqlite3-dev protobuf-compiler
      - name: cargo build --workspace
        run: cargo build --workspace --locked

  # ---------------------------------------------------------------
  # 8. TUI snapshot drift guard — the 23 `insta::assert_snapshot!`
  # tests in `sylvander-tui/tests/snapshots.rs` cover the entire UI
  # surface (modals, composer, breakpoints, AskUser variants, etc.).
  # A change that goes unnoticed in `cargo build` because the binary
  # links fine but shifts visual layout (one extra row in `tool_call_*`
  # snapshots, a new status prefix) would otherwise slip to master.
  # INSTA_UPDATE=no makes the test FAIL on drift instead of silently
  # regenerating, so layout changes are caught in CI before merge.
  # ---------------------------------------------------------------
  tui-snapshots:
    name: tui insta snapshots
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ci-${{ runner.os }}-
          workspaces: |
            target -> target
      - name: System dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev libsqlite3-dev protobuf-compiler
      - name: Install cargo-insta for review artifact
        run: cargo install --locked cargo-insta
      - name: Run insta snapshot tests
        run: |
          INSTA_UPDATE=no cargo test -p sylvander-tui --test snapshots --locked
      - name: Upload any *.snap.new drift as artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: insta-pending-snapshots
          path: |
            sylvander-tui/tests/snapshots/**/*.snap.new
          if-no-files-found: ignore
