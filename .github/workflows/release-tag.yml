name: Release tag

# Triggered when a `v*` tag is pushed to master. Builds the full
# Sylvander app (macOS .app bundle, Rust workspace) and creates
# a GitHub Release with the .app attached.
#
# This is a simplified version of ghostty's `release-tag.yml` —
# no vouch system (we're a private fork, not a community project),
# no per-architecture matrix (we only ship macOS), no Nix caching
# (we use plain GitHub Actions).
#
# Upstream's `release-tip.yml` (1060 lines) runs daily tip-of-tree
# builds. We do NOT replicate that — Sylvander is versioned manually
# via `git tag -a` and a `git push --tags`.

on:
  push:
    tags:
      - 'v*.*.*'        # only semver tags; exclude pre-releases for now
  workflow_dispatch:    # allow manual run with a chosen tag

permissions:
  contents: write       # needed for `gh release create`
  actions: read         # for artifact download

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false   # NEVER cancel a release in progress

jobs:
  build:
    name: Build Sylvander.app
    runs-on: macos-26-xlarge
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0     # need full history for `git describe`

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"
          cache: false

      - name: Select Xcode 26
        run: |
          set -e
          xcode_path="$(ls -d /Applications/Xcode_26*.app | head -n 1)"
          echo "Using $xcode_path"
          sudo xcode-select -s "$xcode_path"
          xcodebuild -version

      - name: Build Sylvander.app (Release)
        working-directory: sylvander-ghostty
        run: |
          # Full release build of the macOS .app. This is the slow
          # path (zig build + xcodebuild + Swift compilation).
          xcodebuild \
            -project macos/Sylvander.xcodeproj \
            -scheme Sylvander \
            -configuration Release \
            -derivedDataPath build \
            -destination 'platform=macOS' \
            build
          ls -la build/Build/Products/Release/Sylvander.app

      - name: Build Rust workspace (release)
        run: cargo build --workspace --release --locked

      - name: Smoke-test the .app
        working-directory: sylvander-ghostty
        run: |
          # Verify it launches and exits cleanly (--help path; the
          # real CLI is a tiny `+version` arg in upstream).
          ./build/Build/Products/Release/Sylvander.app/Contents/MacOS/ghostty +version

      - name: Package .app as zip
        run: |
          cd sylvander-ghostty/build/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent Sylvander.app Sylvander.app.zip
          ls -la Sylvander.app.zip

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sylvander-app
          path: sylvander-ghostty/build/Build/Products/Release/Sylvander.app.zip
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download .app
        uses: actions/download-artifact@v4
        with:
          name: Sylvander-app
          path: dist

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          {
            echo "## Sylvander ${TAG}"
            echo ""
            # Plain bullet list of commits since the previous tag.
            prev=$(gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${{ github.repository }}/releases?per_page=10" \
              | jq -r --arg tag "$TAG" \
                  '[.[] | select(.tag_name != $tag and (.tag_name | startswith("v")))] | .[0].tag_name // empty')
            if [ -n "$prev" ]; then
              echo "Changes since \`${prev}\`:"
              echo ""
              git log "${prev}..${TAG}" --pretty=format:"- %s (%h)" --no-merges
              echo ""
            else
              echo "Initial release."
            fi
          } > dist/RELEASE_NOTES.md
          cat dist/RELEASE_NOTES.md

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create \
            "${{ github.ref_name }}" \
            dist/Sylvander.app.zip \
            --title "Sylvander ${{ github.ref_name }}" \
            --notes-file dist/RELEASE_NOTES.md \
            --draft     # publish manually after smoke-testing
