name: Release tag

# Triggered when a `v*` tag is pushed to master. Builds the full
# Sylvander app (macOS .app bundle, Rust workspace) and creates
# a GitHub Release with the .app attached.
#
# This is a simplified version of ghostty's `release-tag.yml` —
# no vouch system (we're a private fork, not a community project),
# no per-architecture matrix (we only ship macOS), no Nix caching
# (we use plain GitHub Actions).
#
# Upstream's `release-tip.yml` (1060 lines) runs daily tip-of-tree
# builds. We do NOT replicate that — Sylvander is versioned manually
# via `git tag -a` and a `git push --tags`.

on:
  push:
    tags:
      - 'v*.*.*'        # only semver tags; exclude pre-releases for now
  workflow_dispatch:    # allow manual run with a chosen tag

permissions:
  contents: write       # needed for `gh release create`
  actions: read         # for artifact download

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false   # NEVER cancel a release in progress

jobs:
  build:
    name: Build Sylvander.app
    runs-on: macos-26-xlarge
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0     # need full history for `git describe`

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"
          cache: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            target -> target

      - name: Select Xcode 26
        run: |
          set -e
          xcode_path="$(ls -d /Applications/Xcode_26*.app | head -n 1)"
          echo "Using $xcode_path"
          sudo xcode-select -s "$xcode_path"
          xcodebuild -version

      - name: Require distribution credentials
        env:
          CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          set -euo pipefail
          for name in CERTIFICATE_P12 CERTIFICATE_PASSWORD SIGNING_IDENTITY \
            APPLE_ID APPLE_TEAM_ID APPLE_APP_PASSWORD; do
            test -n "${!name}" || { echo "Missing required secret: $name" >&2; exit 1; }
          done

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          keychain="$RUNNER_TEMP/sylvander-signing.keychain-db"
          password="$(openssl rand -hex 24)"
          echo "$password" > "$RUNNER_TEMP/keychain-password"
          echo "$CERTIFICATE_P12" | /usr/bin/base64 -D > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "$password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$password" "$keychain"
          security import "$RUNNER_TEMP/certificate.p12" -k "$keychain" \
            -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$password" "$keychain"
          security list-keychains -d user -s "$keychain" login.keychain-db

      - name: Build universal native components
        run: |
          set -euo pipefail
          cd sylvander-ghostty
          zig build -Demit-macos-app=false -Doptimize=ReleaseFast
          cd ..
          sylvander-ghostty/macos/Scripts/build-sylvander-tui-universal.sh \
            "$GITHUB_WORKSPACE" "$RUNNER_TEMP/sylvander-tui-universal"

      - name: Archive Sylvander.app (Release)
        env:
          SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          xcodebuild \
            -project sylvander-ghostty/macos/Sylvander.xcodeproj \
            -scheme Sylvander \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Sylvander.xcarchive" \
            -destination 'generic/platform=macOS' \
            SYLVANDER_TUI_PATH="$RUNNER_TEMP/sylvander-tui-universal" \
            ARCHS='arm64 x86_64' \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            archive

      - name: Verify, notarize, and staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          set -euo pipefail
          app="$RUNNER_TEMP/Sylvander.xcarchive/Products/Applications/Sylvander.app"
          helper="$app/Contents/Resources/bin/sylvander-tui"
          test -d "$app"
          test "$(lipo -archs "$helper")" = "x86_64 arm64" || \
            test "$(lipo -archs "$helper")" = "arm64 x86_64"
          codesign --verify --deep --strict --verbose=2 "$app"
          ditto -c -k --sequesterRsrc --keepParent "$app" "$RUNNER_TEMP/notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$app"
          xcrun stapler validate "$app"
          spctl --assess --type execute --verbose=2 "$app"

      - name: Smoke-test the .app
        run: |
          "$RUNNER_TEMP/Sylvander.xcarchive/Products/Applications/Sylvander.app/Contents/MacOS/ghostty" +version

      - name: Package .app as zip
        run: |
          mkdir -p dist
          app="$RUNNER_TEMP/Sylvander.xcarchive/Products/Applications/Sylvander.app"
          ditto -c -k --sequesterRsrc --keepParent "$app" dist/Sylvander.app.zip
          shasum -a 256 dist/Sylvander.app.zip > dist/Sylvander.app.zip.sha256
          ls -la dist/Sylvander.app.zip*

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sylvander-app
          path: |
            dist/Sylvander.app.zip
            dist/Sylvander.app.zip.sha256
          retention-days: 30

      - name: Delete temporary signing keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/sylvander-signing.keychain-db" || true

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download .app
        uses: actions/download-artifact@v4
        with:
          name: Sylvander-app
          path: dist

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          {
            echo "## Sylvander ${TAG}"
            echo ""
            # Plain bullet list of commits since the previous tag.
            prev=$(gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${{ github.repository }}/releases?per_page=10" \
              | jq -r --arg tag "$TAG" \
                  '[.[] | select(.tag_name != $tag and (.tag_name | startswith("v")))] | .[0].tag_name // empty')
            if [ -n "$prev" ]; then
              echo "Changes since \`${prev}\`:"
              echo ""
              git log "${prev}..${TAG}" --pretty=format:"- %s (%h)" --no-merges
              echo ""
            else
              echo "Initial release."
            fi
          } > dist/RELEASE_NOTES.md
          cat dist/RELEASE_NOTES.md

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create \
            "${{ github.ref_name }}" \
            dist/Sylvander.app.zip \
            dist/Sylvander.app.zip.sha256 \
            --title "Sylvander ${{ github.ref_name }}" \
            --notes-file dist/RELEASE_NOTES.md \
            --draft     # publish manually after smoke-testing
