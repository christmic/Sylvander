# Sylvander server configuration, schema v1.
schema_version = 1

[server]
mode = "production"
name = "sylvander"
# Defaults to $XDG_DATA_HOME/sylvander or ~/.local/share/sylvander.
# data_dir = "/var/lib/sylvander"
# session_db = "/var/lib/sylvander/sessions.db"
# memory_db = "/var/lib/sylvander/memory.db"
# Durable global User Profile store. Defaults to
# <data_dir>/user-profiles.db; use a private, backed-up location in production.
# user_profile_db = "/var/lib/sylvander/user-profiles.db"
# workspace_journal = "/var/lib/sylvander/workspace-journal"

[server.memory_maintenance]
interval_seconds = 3600
batch_size = 500
max_batches_per_run = 20

[server.memory_maintenance.integrity]

[server.memory_maintenance.integrity.key]
source = "env"
name = "SYLVANDER_MEMORY_INTEGRITY_KEY"

# File anchors must be outside server.data_dir on storage the memory database
# writer cannot modify. Pre-create the parent with restricted permissions.
[server.memory_maintenance.integrity.backend]
kind = "file"
anchor_path = "/var/lib/sylvander-integrity/anchor.json"

# Whole-host replay resistance instead uses a remote monotonic CAS service:
# [server.memory_maintenance.integrity.backend]
# kind = "http"
# endpoint = "https://memory-anchor.example.test/v1/cas"
# timeout_millis = 5000
# read_retries = 3
#
# [server.memory_maintenance.integrity.backend.bearer_token]
# source = "env"
# name = "SYLVANDER_MEMORY_ANCHOR_TOKEN"
#
# Optional private PKI and mTLS material are also secret references:
# [server.memory_maintenance.integrity.backend.ca_certificate]
# source = "file"
# path = "/run/secrets/memory-anchor-ca.pem"
#
# [server.memory_maintenance.integrity.backend.client_identity]
# source = "file"
# path = "/run/secrets/memory-anchor-client.pem"

[server.memory_maintenance.retention]
revision = 1
default_ttl_days = 365
max_ttl_days = 1825
expired_grace_days = 7
superseded_retention_days = 30

[server.memory_maintenance.backup]
interval_seconds = 86400
retained_copies = 7

[server.approval]
enabled = true
# persistent_store = "/var/lib/sylvander/approvals.json"

[server.evidence]
enabled = true
# path = "/var/lib/sylvander/evidence.db"
retention_days = 30
# metadata_only avoids persisting raw prompts, tool payloads, and responses.
content = "metadata_only"

[server.boundary]
max_request_bytes = 1048576
requests_per_minute = 240

# Stable cross-channel users are optional. Enabling this section creates a
# Runtime-owned identity.db and advertises identity_binding_v1.
# [server.identity]
# challenge_ttl_seconds = 300
#
# [server.identity.digest_key]
# source = "env"
# name = "SYLVANDER_IDENTITY_DIGEST_KEY"
#
# [[server.identity.trusted_issuers]]
# transport = "unix"
# channel_instance_id = "terminal"
# principal_id = "local-alice"
# user_id = "alice"

[[model_providers]]
id = "primary"
kind = "anthropic_compatible"
base_url = "https://api.anthropic.com"

[model_providers.api_key]
source = "env"
name = "ANTHROPIC_API_KEY"

[[model_providers.models]]
id = "claude-sonnet"
context_window = 200000
max_output_tokens = 32000
capabilities = ["tool_use", "vision", "prompt_caching"]

[[execution_targets]]
id = "local"

[execution_targets.transport]
kind = "local"
root = "/"

[[agents]]
revision = 1
default_prompt_profile = "claude"
allow_session_prompt = false

[agents.access]
allow_authenticated = true

[agents.spec]
id = "sylvander"
name = "Sylvander"

[agents.spec.persona]
system_prompt = "You are Sylvander, a careful and capable coding Agent."
description = "Primary coding Agent"

[agents.spec.model]
provider = "primary"
model_name = "claude-sonnet"
max_tokens = 32000

[agents.spec.behavior]
max_iterations = 50
max_retries = 3

[agents.agent_workspace]
execution_target = "local"
path = "/var/lib/sylvander/agents/sylvander"
read_only = false

[[agents.prompt_profiles]]
id = "claude"
qualified_models = [{ provider_id = "primary", model_id = "claude-sonnet" }]
system_prompt = "You are Sylvander, a careful and capable coding Agent."

[[channels]]
id = "terminal"
enabled = true
default_agent = "sylvander"

[channels.supervision]
max_restart_attempts = 5
initial_backoff_ms = 250
max_backoff_ms = 5000

[channels.transport]
kind = "unix"
path = "/tmp/sylvander.sock"

[[channels]]
id = "http-debug"
enabled = false
default_agent = "sylvander"

[channels.transport]
kind = "http"
bind = "127.0.0.1:8080"
principal_id = "local-http-client"

[channels.transport.bearer_token]
source = "env"
name = "SYLVANDER_HTTP_TOKEN"

# Each bot is a separate channel instance. Duplicate this block with a unique
# id, bind address, and secret references to configure another Telegram bot.
[[channels]]
id = "telegram-primary"
enabled = false
default_agent = "sylvander"

[channels.transport]
kind = "telegram"
bind = "127.0.0.1:8090"

[channels.transport.token]
source = "env"
name = "TELEGRAM_PRIMARY_TOKEN"

[channels.transport.webhook_secret]
source = "env"
name = "TELEGRAM_PRIMARY_WEBHOOK_SECRET"
