<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1240" viewBox="0 0 1900 1240">
  <title>Sylvander CJK IME and advanced composer</title><defs><style>.bg{fill:#0B0D0F}.p{fill:#111315;stroke:#343A40}.t{fill:#ECE7DE;font:14px Menlo,monospace}.h{fill:#ECE7DE;font:700 18px Menlo,monospace}.s{fill:#989B9D;font:12px Menlo,monospace}.x{fill:#666C72;font:11px Menlo,monospace}.a{fill:#E8796A}.b{fill:#75A7E8}.g{fill:#72C7B1}.y{fill:#D9AF62}.r{fill:#E06C75}.line{stroke:#343A40}.focus{fill:#E8796A08;stroke:#E8796A}.token{fill:#1A1E22;stroke:#4A535C}</style></defs><rect class="bg" width="1900" height="1240"/><text class="h" x="50" y="52"><tspan class="a">◖S◗</tspan> COMPOSER · CJK / IME / ATTACHMENTS / HISTORY</text>
  <g id="ime" transform="translate(50 90)"><rect class="p" width="900" height="480" rx="10"/><text class="s a" x="26" y="38">01 · CHINESE IME COMPOSITION</text><rect class="focus" x="20" y="74" width="860" height="160" rx="6"/><text class="t" x="38" y="112">请先分析现有的认证中间件，然后</text><text class="t" x="38" y="148">提出一个兼容现有接口的设计方<tspan text-decoration="underline" class="a">an</tspan></text><text class="x" x="38" y="204">IME composition active · Enter confirms candidate, never sends</text><rect class="token" x="360" y="250" width="490" height="148" rx="6"/><text class="t" x="380" y="280">1. 案   2. 按   3. 暗   4. 安</text><text class="s" x="380" y="316">方案  按照  安全</text><text class="x" x="380" y="372">space select · esc cancel composition</text><line class="line" x1="26" y1="426" x2="874" y2="426"/><text class="s" x="26" y="458">Caret and deletion follow grapheme clusters and terminal cell width.</text></g>
  <g id="attachments" transform="translate(1000 90)"><rect class="p" width="850" height="480" rx="10"/><text class="s b" x="26" y="38">02 · ATTACHMENTS + MENTIONS</text><rect class="token" x="26" y="74" width="300" height="40" rx="5"/><text class="t" x="42" y="100">@file src/auth/mod.rs  ×</text><rect class="token" x="344" y="74" width="238" height="40" rx="5"/><text class="t" x="360" y="100">▣ error.log · 84L  ×</text><rect class="token" x="600" y="74" width="218" height="40" rx="5"/><text class="t" x="616" y="100">▧ diagram.png  ×</text><line class="line" x1="26" y1="142" x2="824" y2="142"/><text class="t" x="26" y="184">Ask <tspan class="a">@agent explorer</tspan> to compare this with <tspan class="b">@session auth-v1</tspan>.</text><text class="s" x="26" y="224">@ completion stores typed references, not display strings.</text><text class="y t" x="26" y="282">! diagram.png adds ~18k context tokens</text><text class="r t" x="26" y="326">! pasted text may contain an API key · review before send</text><line class="line" x1="26" y1="370" x2="824" y2="370"/><text class="s" x="26" y="412">enter send · tab complete · p preview · x remove selected</text></g>
  <g id="history" transform="translate(50 620)"><rect class="p" width="900" height="540" rx="10"/><text class="s g" x="26" y="38">03 · PROMPT HISTORY + UNDO</text><text class="t" x="26" y="80">Ctrl+R  auth middleware_</text><line class="line" x1="26" y1="104" x2="874" y2="104"/><rect class="focus" x="18" y="130" width="864" height="70" rx="4"/><text class="t" x="34" y="160">Add JWT authentication; inspect middleware first</text><text class="x" x="34" y="184">this session · 22 minutes ago</text><text class="t" x="34" y="242">Review authentication compatibility</text><text class="x" x="34" y="266">workspace · yesterday</text><text class="t" x="34" y="324">Summarize middleware changes</text><text class="x" x="34" y="348">global · Jul 8</text><line class="line" x1="26" y1="390" x2="874" y2="390"/><text class="s" x="26" y="428">enter restore · ctrl+g expand scope · esc keep current draft</text><text class="s" x="26" y="466">Restoring creates an undo point; current draft is never discarded.</text></g>
  <g id="editor-modes" transform="translate(1000 620)"><rect class="p" width="850" height="540" rx="10"/><text class="s y" x="26" y="38">04 · EDITING + DRAFT RECOVERY</text><text class="h" x="26" y="82">Composer settings</text><text class="t" x="26" y="130">Keymap       Standard / Emacs / Vi</text><text class="t" x="26" y="174">Send         Enter</text><text class="t" x="26" y="218">Newline      Shift+Enter</text><text class="t" x="26" y="262">Autosave     500ms idle + view switch</text><text class="t" x="26" y="306">Paste        bracketed · async parse</text><line class="line" x1="26" y1="346" x2="824" y2="346"/><text class="r t" x="26" y="390">Two drafts found from linked views</text><text class="s" x="26" y="424">Compare and merge · keep both queued · select one</text><text class="g t" x="26" y="478">✓ Undo snapshot available after merge or history restore</text></g>
</svg>
