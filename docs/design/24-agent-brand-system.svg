<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="1440" viewBox="0 0 2000 1440"><title>Sylvander Vector Core brand system</title><defs><style>.bg{fill:#090B0E}.card{fill:#111419;stroke:#2C323B}.t{fill:#F0ECE4;font:15px Menlo}.h{fill:#F0ECE4;font:700 22px Menlo}.s{fill:#9299A5;font:12px Menlo}.v{fill:#9B8CFF}.c{fill:#FF806F}.q{fill:#6DD6E8}.line{stroke:#38414D}.violet{fill:none;stroke:#9B8CFF;stroke-width:8;stroke-linecap:round;stroke-linejoin:round}.cyan{fill:none;stroke:#6DD6E8;stroke-width:8;stroke-linecap:round;stroke-linejoin:round}</style><symbol id="mark" viewBox="0 0 270 240"><path class="violet" d="M20 120L72 50H168L220 120L168 190H72L20 120Z"/><path class="cyan" d="M168 68L240 120L168 172"/><path d="M90 120L120 90L150 120L120 150Z" fill="#FF806F"/><circle cx="120" cy="120" r="9" fill="#F0ECE4"/></symbol></defs><rect class="bg" width="2000" height="1440"/><text class="h" x="70" y="64">VECTOR CORE · BRAND SYSTEM</text><text class="s" x="70" y="94">perception aperture · decision core · action vector</text>
<g id="primary" transform="translate(70 140)"><rect class="card" width="1180" height="420" rx="16"/><text class="v t" x="30" y="42">01 · PRIMARY WORDMARK</text><use href="#mark" x="80" y="86" width="300" height="260"/><text x="430" y="215" fill="#F0ECE4" font-family="Menlo" font-size="48" font-weight="700" letter-spacing="5">SYLVANDER</text><text class="s" x="435" y="258">AGENT WORKSPACE</text><text class="t" x="435" y="314"><tspan class="v">OBSERVE</tspan>  ·  <tspan class="c">DECIDE</tspan>  ·  <tspan class="q">ACT</tspan></text></g>
<g id="app-icon" transform="translate(1320 140)"><rect class="card" width="610" height="420" rx="16"/><text class="q t" x="30" y="42">02 · APP ICON</text><rect x="145" y="80" width="320" height="320" rx="74" fill="#111419" stroke="#2C323B"/><use href="#mark" x="180" y="120" width="260" height="230"/></g>
<g id="terminal" transform="translate(70 620)"><rect class="card" width="900" height="340" rx="16"/><text class="v t" x="30" y="42">03 · TERMINAL SYSTEM</text><text x="60" y="118" fill="#9B8CFF" font-family="Menlo" font-size="34">◆</text><text x="98" y="118" fill="#6DD6E8" font-family="Menlo" font-size="34">›</text><text x="142" y="118" fill="#F0ECE4" font-family="Menlo" font-size="34" font-weight="700">SYLVANDER</text><text class="t" x="60" y="182"><tspan class="v">◆</tspan><tspan class="q">›</tspan>  Primary Unicode mark</text><text class="t" x="60" y="228">[o]&gt;  ASCII fallback</text><text class="t" x="60" y="274"><tspan class="v">◆</tspan>  Compact rail / agent turn marker</text><text class="s" x="60" y="312">Diamond = decision core · chevron = action</text></g>
<g id="monochrome" transform="translate(1030 620)"><rect class="card" width="900" height="340" rx="16"/><text class="t" x="30" y="42">04 · MONOCHROME + SMALL SIZE</text><g transform="translate(62 82) scale(.7)"><use href="#mark" width="270" height="240"/></g><g transform="translate(300 96) scale(.45)"><use href="#mark" width="270" height="240"/></g><g transform="translate(480 110) scale(.28)"><use href="#mark" width="270" height="240"/></g><text class="s" x="58" y="292">64px</text><text class="s" x="298" y="292">32px</text><text class="s" x="478" y="292">16px</text><path d="M650 100L688 50H758L796 100L758 150H688L650 100ZM758 62L810 100L758 138" fill="none" stroke="#F0ECE4" stroke-width="6"/><text class="s" x="648" y="292">one-color</text></g>
<g id="roles" transform="translate(70 1020)"><rect class="card" width="1860" height="330" rx="16"/><text class="c t" x="30" y="42">05 · BRAND ROLE LANGUAGE</text><text class="v h" x="60" y="110">◆</text><text class="t" x="110" y="110">Sylvander intelligence / response / decision</text><text class="c h" x="60" y="162">›</text><text class="t" x="110" y="162">User intent / selection / instruction</text><text class="q h" x="60" y="214">◐</text><text class="t" x="110" y="214">Execution / live tool / forward progress</text><text class="t" x="840" y="110">explorer <tspan class="v">◇</tspan></text><text class="s" x="1030" y="110">subagent · hollow core</text><text class="t" x="840" y="162">main <tspan class="v">◆</tspan></text><text class="s" x="1030" y="162">primary agent · filled core</text><text class="t" x="840" y="214">team <tspan class="v">◆◇◇</tspan></text><text class="s" x="1030" y="214">orchestrated agent group</text><line class="line" x1="30" y1="260" x2="1830" y2="260"/><text class="s" x="30" y="300">The brand becomes a semantic UI language, not a logo pasted into every screen.</text></g></svg>
