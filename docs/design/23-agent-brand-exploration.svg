<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="1400" viewBox="0 0 2000 1400"><title>Sylvander agent brand logo exploration</title><defs><style>.bg{fill:#090B0E}.card{fill:#111419;stroke:#2C323B}.t{fill:#F0ECE4;font:15px Menlo}.h{fill:#F0ECE4;font:700 22px Menlo}.s{fill:#9299A5;font:12px Menlo}.v{fill:#9B8CFF}.c{fill:#FF806F}.q{fill:#6DD6E8}.line{stroke:#38414D}.mono{fill:none;stroke:#F0ECE4;stroke-width:6;stroke-linecap:round;stroke-linejoin:round}.violet{fill:none;stroke:#9B8CFF;stroke-width:8;stroke-linecap:round;stroke-linejoin:round}.coral{fill:none;stroke:#FF806F;stroke-width:8;stroke-linecap:round;stroke-linejoin:round}.cyan{fill:none;stroke:#6DD6E8;stroke-width:8;stroke-linecap:round;stroke-linejoin:round}</style></defs><rect class="bg" width="2000" height="1400"/><text class="h" x="70" y="64">SYLVANDER · AGENT BRAND EXPLORATION</text><text class="s" x="70" y="94">frontier intelligence · terminal action · durable orchestration · no mascot literalism</text>
<g id="vector-core" transform="translate(70 140)"><rect class="card" width="900" height="520" rx="16"/><text class="v t" x="30" y="42">A · VECTOR CORE · RECOMMENDED</text><g transform="translate(90 112)"><path class="violet" d="M30 120L78 54H170L218 120L170 186H78L30 120Z"/><path class="cyan" d="M170 72L234 120L170 168"/><path d="M95 120L124 91L153 120L124 149Z" fill="#FF806F"/><circle cx="124" cy="120" r="9" fill="#F0ECE4"/></g><text class="h" x="380" y="205">SYLVANDER</text><text class="s" x="380" y="242">Observe · Decide · Act</text><text class="t" x="380" y="302"><tspan class="v">◆</tspan><tspan class="q">›</tspan>  agent core + forward vector</text><line class="line" x1="30" y1="382" x2="870" y2="382"/><text class="s" x="30" y="424">Strong at 16px · directional · multi-agent extensible</text><text class="s" x="30" y="454">No letter dependency · works native, terminal, monochrome</text><text class="s c" x="30" y="484">Meaning: context converges into a decision that moves work forward</text></g>
<g id="constellation" transform="translate(1030 140)"><rect class="card" width="900" height="520" rx="16"/><text class="q t" x="30" y="42">B · CONSTELLATION</text><g transform="translate(110 124)"><path class="cyan" d="M50 160L150 60L250 150L150 238Z"/><circle cx="50" cy="160" r="16" fill="#FF806F"/><circle cx="150" cy="60" r="16" fill="#9B8CFF"/><circle cx="250" cy="150" r="16" fill="#6DD6E8"/><circle cx="150" cy="238" r="16" fill="#F0ECE4"/></g><text class="h" x="420" y="205">SYLVANDER</text><text class="s" x="420" y="242">Many agents, one objective</text><line class="line" x1="30" y1="382" x2="870" y2="382"/><text class="s" x="30" y="424">Good orchestration story, weaker small-size silhouette</text><text class="s" x="30" y="454">Feels infrastructural rather than personally intelligent</text></g>
<g id="prompt-fold" transform="translate(70 720)"><rect class="card" width="900" height="520" rx="16"/><text class="c t" x="30" y="42">C · PROMPT FOLD</text><g transform="translate(100 126)"><path class="coral" d="M38 60H180L250 130L180 200H38L108 130Z"/><path class="violet" d="M108 60L178 130L108 200"/><circle cx="178" cy="130" r="12" fill="#F0ECE4"/></g><text class="h" x="420" y="205">SYLVANDER</text><text class="s" x="420" y="242">Intent folded into execution</text><line class="line" x1="30" y1="382" x2="870" y2="382"/><text class="s" x="30" y="424">Strong terminal cue, but too close to generic prompt branding</text><text class="s" x="30" y="454">Less distinctive outside developer surfaces</text></g>
<g id="oracle-lens" transform="translate(1030 720)"><rect class="card" width="900" height="520" rx="16"/><text class="v t" x="30" y="42">D · ORACLE LENS</text><g transform="translate(100 126)"><path class="violet" d="M24 130C82 48 218 48 276 130C218 212 82 212 24 130Z"/><path d="M112 130L150 92L188 130L150 168Z" fill="#6DD6E8"/><circle cx="150" cy="130" r="10" fill="#090B0E"/></g><text class="h" x="420" y="205">SYLVANDER</text><text class="s" x="420" y="242">See the system, find the path</text><line class="line" x1="30" y1="382" x2="870" y2="382"/><text class="s" x="30" y="424">Intelligent and elegant, but overly passive for an agent</text><text class="s" x="30" y="454">Better for analysis than execution-oriented identity</text></g></svg>
