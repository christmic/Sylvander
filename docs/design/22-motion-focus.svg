<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1280" viewBox="0 0 1900 1280"><title>Sylvander motion focus and feedback</title><defs><style>.bg{fill:#0B0D0F}.p{fill:#111315;stroke:#343A40}.t{fill:#ECE7DE;font:14px Menlo}.h{fill:#ECE7DE;font:700 18px Menlo}.s{fill:#989B9D;font:12px Menlo}.x{fill:#666C72;font:11px Menlo}.a{fill:#E8796A}.b{fill:#75A7E8}.g{fill:#72C7B1}.y{fill:#D9AF62}.line{stroke:#343A40}.sel{fill:#E8796A08;stroke:#E8796A}.toast{fill:#1A1E22;stroke:#4A535C}</style></defs><rect class="bg" width="1900" height="1280"/><text class="h" x="50" y="52"><tspan class="a">◖S◗</tspan> MOTION + FOCUS + FEEDBACK</text>
<g id="timeline" transform="translate(50 90)"><rect class="p" width="1800" height="390" rx="10"/><text class="s b" x="26" y="38">01 · PERCEPTUAL TIMING</text><line class="line" x1="100" y1="132" x2="1700" y2="132"/><circle class="b" cx="180" cy="132" r="7"/><circle class="b" cx="520" cy="132" r="7"/><circle class="g" cx="920" cy="132" r="7"/><circle class="g" cx="1260" cy="132" r="7"/><circle class="a" cx="1600" cy="132" r="7"/><text class="t" text-anchor="middle" x="180" y="96">Tool starts</text><text class="s" text-anchor="middle" x="180" y="172">spinner 4–6 fps</text><text class="t" text-anchor="middle" x="520" y="96">Streaming</text><text class="s" text-anchor="middle" x="520" y="172">coalesce ≤30 fps</text><text class="t" text-anchor="middle" x="920" y="96">Tool done</text><text class="s" text-anchor="middle" x="920" y="172">hold 500ms</text><text class="t" text-anchor="middle" x="1260" y="96">Settle</text><text class="s" text-anchor="middle" x="1260" y="172">preserve anchor</text><text class="t" text-anchor="middle" x="1600" y="96">Toast</text><text class="s" text-anchor="middle" x="1600" y="172">2–3s no reflow</text><line class="line" x1="26" y1="226" x2="1774" y2="226"/><text class="s" x="26" y="270">Reduced motion</text><text class="t" x="250" y="270">static “working · 00:18” · direct overlay · no pulse · no rewrite animation</text><text class="s" x="26" y="318">Principle</text><text class="t" x="250" y="318">Movement confirms state; it never decorates or steals attention.</text></g>
<g id="focus" transform="translate(50 530)"><rect class="p" width="880" height="650" rx="10"/><text class="s a" x="26" y="38">02 · FOCUS LANGUAGE</text><text class="x" x="26" y="84">COMPOSER</text><rect class="a" x="26" y="106" width="3" height="44"/><text class="t" x="44" y="134">Ask Sylvander…│</text><text class="x" x="26" y="196">SELECTED ROW</text><rect class="sel" x="18" y="216" width="844" height="44" rx="4"/><text class="t" x="34" y="244"><tspan class="a">›</tspan> Allow once</text><text class="x" x="26" y="306">TRANSCRIPT OBJECT</text><rect class="a" x="26" y="328" width="3" height="72"/><text class="t" x="44" y="354">Edited src/auth/jwt.rs</text><text class="s" x="44" y="382">+48 -3 · Enter inspect</text><text class="x" x="26" y="452">SEARCH MATCH</text><text class="t" x="26" y="482">The <tspan class="y" text-decoration="underline">authentication</tspan> boundary is reusable.</text><line class="line" x1="26" y1="530" x2="854" y2="530"/><text class="s" x="26" y="572">Focus always has shape + position, never color alone.</text><text class="s" x="26" y="608">Esc restores exact previous focus and scroll anchor.</text></g>
<g id="scroll-toast" transform="translate(980 530)"><rect class="p" width="870" height="650" rx="10"/><text class="s b" x="26" y="38">03 · SCROLL / UNREAD / TOAST</text><text class="t" x="26" y="88">User is reading turn 12 of 38.</text><text class="s" x="26" y="124">Streaming continues without moving the viewport.</text><rect class="toast" x="230" y="158" width="410" height="44" rx="22"/><text class="b t" text-anchor="middle" x="435" y="186">3 new events · return to live</text><line class="line" x1="26" y1="238" x2="844" y2="238"/><text class="x" x="26" y="278">TOAST · DOES NOT REFLOW TRANSCRIPT</text><rect class="toast" x="390" y="306" width="430" height="54" rx="7"/><text class="g t" x="410" y="339">✓ Draft restored from api-review</text><text class="s" x="26" y="410">Show toast only for:</text><text class="t" x="26" y="448">mode change · draft recovery · rule saved/revoked</text><text class="t" x="26" y="484">artifact written · copy complete · reconnect success</text><text class="s" x="26" y="538">Ordinary tool success does not create a toast.</text><text class="s" x="26" y="574">Maximum one visible toast; newer items queue briefly.</text></g></svg>
