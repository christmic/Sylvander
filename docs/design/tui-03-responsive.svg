<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120">
  <title>Sylvander TUI — Current Responsive Contract</title>
  <defs><style>
    .page{fill:#0B0B0D}.screen{fill:#000;stroke:#343A40}.text{fill:#ECE7DE}.dim{fill:#989B9D}.muted{fill:#666C72}.warm{fill:#F0BE72}.violet{fill:#9B72FF}.rule{stroke:#343A40;stroke-width:1}.guide{stroke:#9B72FF;stroke-width:1;stroke-dasharray:4 4}
    .title{font:700 25px Inter,system-ui,sans-serif}.head{font:700 17px Inter,system-ui,sans-serif}.mono{font:14px 'SFMono-Regular',Menlo,monospace;white-space:pre}.tiny{font:11px 'SFMono-Regular',Menlo,monospace;white-space:pre}
  </style></defs>
  <rect class="page" width="1800" height="1120"/><text class="title text" x="48" y="52">SYLVANDER TUI · RESPONSIVE CONTRACT</text>
  <g id="standard" transform="translate(48 90)">
    <text class="head violet" y="0">01 · STANDARD 120 COL</text><rect class="screen" y="20" width="800" height="430" rx="8"/>
    <line class="guide" x1="18" y1="34" x2="18" y2="356"/><text class="mono warm" x="18" y="70">      ⣠⣤  ⢀⣠⣶⣿</text><text class="mono violet" x="190" y="70">⡇⣿⣷⣤⣀</text>
    <text class="mono warm" x="18" y="96">  ⢠⣴⣄⠸⠛⠉ ⢰⣿⣿</text><text class="mono violet" x="190" y="96">  ⢹⣷⠄⣾⣿</text>
    <text class="head text" x="410" y="70">Sylvander</text><text class="mono violet" x="410" y="96">agent workspace</text>
    <text class="mono dim" x="410" y="140">model      MiniMax-M3</text><text class="mono dim" x="410" y="166">workspace  ~/Sylvander</text>
    <line class="rule" x1="0" y1="372" x2="800" y2="372"/><text class="mono dim" x="0" y="400">&gt;</text><line class="rule" x1="0" y1="416" x2="800" y2="416"/>
    <text class="tiny muted" x="0" y="442">fixed left origin · full-width Composer</text>
  </g>
  <g id="fullscreen" transform="translate(900 90)">
    <text class="head violet" y="0">02 · FULLSCREEN 240 COL</text><rect class="screen" y="20" width="850" height="430" rx="8"/>
    <line class="guide" x1="18" y1="34" x2="18" y2="356"/><rect x="18" y="50" width="455" height="210" fill="none" stroke="#343A40" stroke-dasharray="5 5"/>
    <text class="mono warm" x="32" y="88">SEED-CRAB</text><text class="head text" x="278" y="88">Sylvander</text><text class="mono violet" x="278" y="114">agent workspace</text>
    <text class="tiny muted" x="500" y="72">Extra width stays here →</text><line class="guide" x1="500" y1="82" x2="820" y2="82"/>
    <line class="rule" x1="0" y1="372" x2="850" y2="372"/><text class="mono dim" x="0" y="400">&gt;</text><line class="rule" x1="0" y1="416" x2="850" y2="416"/>
    <text class="tiny muted" x="0" y="442">content never recenters</text>
  </g>
  <g id="narrow" transform="translate(48 620)">
    <text class="head violet" y="0">03 · NARROW 70 COL</text><rect class="screen" y="20" width="500" height="430" rx="8"/>
    <text class="mono warm" x="18" y="62">      ⣠⣤  ⢀⣠⣶⣿</text><text class="mono violet" x="190" y="62">⡇⣿⣷⣤⣀</text>
    <text class="mono warm" x="18" y="88">  ⢠⣴⣄⠸⠛⠉ ⢰⣿⣿</text><text class="mono violet" x="190" y="88">  ⢹⣷⠄⣾⣿</text>
    <text class="head text" x="18" y="144">Sylvander</text><text class="mono violet" x="18" y="170">agent workspace</text><text class="mono dim" x="18" y="212">model      MiniMax-M3</text><text class="mono dim" x="18" y="238">workspace  ~/Sylvander</text>
    <line class="rule" x1="0" y1="372" x2="500" y2="372"/><text class="mono dim" x="0" y="400">&gt;</text><line class="rule" x1="0" y1="416" x2="500" y2="416"/>
  </g>
  <g id="multiline" transform="translate(620 620)">
    <text class="head violet" y="0">04 · COMPOSER GROWS UPWARD</text><rect class="screen" y="20" width="1130" height="430" rx="8"/>
    <text class="mono dim" x="24" y="82">◆  Agent output remains above and never enters the Composer.</text>
    <line class="rule" x1="0" y1="300" x2="1130" y2="300"/><text class="mono text" x="0" y="332">&gt; first visual row wraps naturally across the available width</text><text class="mono text" x="22" y="362">continuation aligns after the prompt</text><text class="mono text" x="22" y="392">explicit newline adds another row</text><line class="rule" x1="0" y1="416" x2="1130" y2="416"/>
    <text class="tiny muted" x="0" y="442">one row by default · maximum eight visible rows · rules stay full width</text>
  </g>
</svg>
