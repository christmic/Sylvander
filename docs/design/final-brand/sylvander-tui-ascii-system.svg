<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <title>Sylvander TUI ASCII and Pixel Presence System</title>
  <desc>Terminal-native renditions of the approved Seed-Crab-Core character. These are display adaptations, not replacements for the detailed brand character.</desc>
  <defs>
    <style>
      .bg{fill:#0e0d10}.panel{fill:#131218}.ivory{fill:#eee5d7}.muted{fill:#918d97}.faint{fill:#5f5b65}.warm{fill:#e38a57}.violet{fill:#9b8cff}.cyan{fill:#67c8df}.teal{fill:#70c9ad}.amber{fill:#d6a45d}.rule{stroke:#35313a;stroke-width:1}
      .title{font:700 27px Inter,system-ui,sans-serif}.head{font:650 17px Inter,system-ui,sans-serif}.mono{font:17px 'SFMono-Regular',Consolas,monospace;white-space:pre}.small{font:13px 'SFMono-Regular',Consolas,monospace;white-space:pre}.hero{font:22px 'SFMono-Regular',Consolas,monospace;white-space:pre}.tiny{font:11px 'SFMono-Regular',Consolas,monospace}
    </style>
  </defs>
  <rect width="1600" height="1000" class="bg"/>
  <text x="48" y="55" class="title ivory">SYLVANDER · TERMINAL CHARACTER SYSTEM</text>
  <text x="48" y="82" class="small muted">ASCII / Unicode / pixel adaptations of the approved Seed–Crab–Core pet</text>

  <g id="unicode-hero" transform="translate(48 118)">
    <rect width="720" height="360" rx="16" class="panel"/>
    <text x="24" y="34" class="small violet">01 · WELCOME · 8 ROW UNICODE</text>
    <g transform="translate(65 80)">
      <text y="0" class="hero violet">              ·──●──·</text>
      <text y="29" class="hero ivory">       ╭╮   ╭╯  ·  ╰╮</text>
      <text y="58" class="hero warm">    ╭──╯╰──╮</text><text x="143" y="58" class="hero violet">╭──╯╰──╮</text>
      <text y="87" class="hero warm">  ╭─╯</text><text x="66" y="87" class="hero ivory">  ●</text><text x="112" y="87" class="hero ivory">  ●</text><text x="152" y="87" class="hero violet">       ╰─╮</text>
      <text y="116" class="hero warm">╭─╯  ╭──╮</text><text x="125" y="116" class="hero violet">  ╭──╮  ╰─╮</text>
      <text y="145" class="hero warm">╰╮ ╭─╯  ╰─╮</text><text x="167" y="145" class="hero violet">╭─╯ ╰╮</text>
      <text y="174" class="hero warm"> ╰╮╱╲╱╲╱╲╭╯</text><text x="167" y="174" class="hero violet">╰╮╱╲╱╲╱╲╭╯</text>
      <text y="203" class="hero muted">  ╰────────╯  ╰────────╯</text>
    </g>
    <text x="425" y="137" class="title ivory">Sylvander</text>
    <text x="427" y="168" class="small muted">~/workspace · model · plan</text>
    <text x="425" y="232" class="head ivory">What should we work through?</text>
    <line x1="425" y1="276" x2="670" y2="276" class="rule"/>
    <text x="440" y="307" class="small faint">Ask Sylvander…</text>
  </g>

  <g id="ascii-fallback" transform="translate(792 118)">
    <rect width="760" height="360" rx="16" class="panel"/>
    <text x="24" y="34" class="small violet">02 · STRICT ASCII FALLBACK</text>
    <g transform="translate(55 91)">
      <text y="0" class="hero ivory">             .--o--.</text>
      <text y="30" class="hero warm">       /\</text><text x="94" y="30" class="hero violet">       /\</text>
      <text y="60" class="hero warm">   .--'  '--.</text><text x="153" y="60" class="hero violet">--'  '--.</text>
      <text y="90" class="hero warm">  /</text><text x="55" y="90" class="hero ivory">   o    o</text><text x="169" y="90" class="hero violet">   \</text>
      <text y="120" class="hero warm"> &lt;   /\</text><text x="85" y="120" class="hero ivory">____</text><text x="141" y="120" class="hero violet">/\   &gt;</text>
      <text y="150" class="hero warm">  \_/  \</text><text x="112" y="150" class="hero violet">/  \_/</text>
      <text y="180" class="hero warm">  /_/\_/\</text><text x="126" y="180" class="hero violet">_/\_\</text>
    </g>
    <text x="430" y="112" class="small ivory">Identity survives without:</text>
    <text x="430" y="151" class="small muted">· color</text><text x="430" y="178" class="small muted">· Unicode width assumptions</text>
    <text x="430" y="205" class="small muted">· animation</text><text x="430" y="232" class="small muted">· image protocols</text>
  </g>

  <g id="turn-states" transform="translate(48 505)">
    <rect width="980" height="430" rx="16" class="panel"/>
    <text x="24" y="34" class="small violet">03 · IMMERSIVE TURN STATES</text>
    <text x="40" y="88" class="mono warm">›</text><text x="70" y="88" class="mono ivory">Review authentication and run focused tests.</text>
    <text x="40" y="144" class="small violet"> /\</text><text x="40" y="163" class="small violet">(••)</text><text x="40" y="182" class="small violet">&lt;__&gt;</text>
    <text x="110" y="151" class="mono ivory">I’ll trace callers, update the contract, and verify it.</text>
    <line x1="120" y1="185" x2="120" y2="278" class="rule"/>
    <text x="145" y="211" class="small violet">◇ explorer · 14 callers · ready</text>
    <text x="145" y="240" class="small cyan">◐ tester · 11 / 18 · running</text>
    <text x="145" y="269" class="small teal">✓ focused test suite · verified</text>
    <line x1="40" y1="326" x2="940" y2="326" class="rule"/>
    <text x="56" y="361" class="small faint">Ask Sylvander…</text>
    <text x="700" y="361" class="tiny muted">working · context 24% · plan</text>
    <text x="40" y="407" class="tiny muted">The pet appears once per meaningful turn; ordinary paragraphs remain borderless.</text>
  </g>

  <g id="sidebar-narrow" transform="translate(1052 505)">
    <rect width="500" height="430" rx="16" class="panel"/>
    <text x="24" y="34" class="small violet">04 · GHOSTTY SIDEBAR / NARROW</text>
    <text x="34" y="83" class="small violet">/\</text><text x="34" y="101" class="small violet">••</text>
    <text x="75" y="93" class="head ivory">Sylvander</text>
    <text x="34" y="142" class="tiny faint">WAITING FOR YOU</text>
    <circle cx="42" cy="170" r="5" class="amber"/><text x="60" y="175" class="small ivory">API review</text>
    <text x="34" y="215" class="tiny faint">ACTIVE</text>
    <rect x="25" y="230" width="280" height="58" rx="5" fill="#1b1922"/>
    <rect x="25" y="230" width="3" height="58" class="violet"/>
    <circle cx="42" cy="250" r="5" class="cyan"/><text x="60" y="255" class="small ivory">Auth refactor</text>
    <text x="60" y="275" class="tiny muted">main + 2 subagents</text>
    <circle cx="42" cy="319" r="5" class="teal"/><text x="60" y="324" class="small muted">TUI design</text>
    <line x1="332" y1="66" x2="332" y2="385" class="rule"/>
    <text x="355" y="92" class="tiny muted">40 COL</text>
    <text x="355" y="126" class="small violet">/\ Sylvander</text>
    <text x="355" y="154" class="small ivory">working</text>
    <text x="355" y="207" class="small warm">› review API</text>
    <text x="355" y="248" class="small violet">(••)</text>
    <text x="355" y="276" class="small ivory">tracing…</text>
    <line x1="350" y1="329" x2="468" y2="329" class="rule"/>
    <text x="355" y="356" class="tiny faint">Ask…</text>
  </g>
</svg>
