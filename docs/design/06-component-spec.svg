<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1260" viewBox="0 0 1900 1260">
  <title>Sylvander brand and component specification</title><defs><style>.bg{fill:#0B0D0F}.p{fill:#111315;stroke:#343A40}.t{fill:#ECE7DE;font:14px Menlo,monospace}.h{fill:#ECE7DE;font:700 18px Menlo,monospace}.s{fill:#989B9D;font:12px Menlo,monospace}.x{fill:#666C72;font:11px Menlo,monospace}.a{fill:#E8796A}.b{fill:#75A7E8}.g{fill:#72C7B1}.y{fill:#D9AF62}.r{fill:#E06C75}.line{stroke:#343A40}.focus{fill:#E8796A08;stroke:#E8796A}.claw{fill:none;stroke:#E8796A;stroke-width:7;stroke-linecap:round}</style></defs><rect class="bg" width="1900" height="1260"/><text class="h" x="50" y="52"><tspan class="a">◖S◗</tspan> BRAND + COMPONENT SPECIFICATION</text>
  <g id="brand" transform="translate(50 90)"><rect class="p" width="870" height="360" rx="10"/><text class="s a" x="26" y="38">01 · BRAND MARK</text><g transform="translate(70 92)"><path class="claw" d="M55 30C20 0 0 28 22 52"/><path class="claw" d="M105 30C140 0 160 28 138 52"/><ellipse cx="80" cy="52" rx="34" ry="27" fill="#E8796A"/><text x="80" y="61" text-anchor="middle" fill="#111315" font="700 25px Menlo">S</text></g><text class="h" x="260" y="150">SYLVANDER</text><text class="s" x="260" y="182">intelligent terminal workspace</text><text class="t" x="70" y="255"><tspan class="a">◖S◗</tspan> SYLVANDER  <tspan class="s">Unicode terminal</tspan></text><text class="t" x="70" y="302"><tspan class="a">[S]</tspan> SYLVANDER  <tspan class="s">ASCII fallback</tspan></text></g>
  <g id="state-icons" transform="translate(980 90)"><rect class="p" width="870" height="360" rx="10"/><text class="s" x="26" y="38">02 · STATE LANGUAGE</text><text class="b h" x="40" y="96">◐</text><text class="t" x="90" y="96">working</text><text class="y h" x="40" y="142">●</text><text class="t" x="90" y="142">waiting for user</text><text class="g h" x="40" y="188">✓</text><text class="t" x="90" y="188">verified / complete</text><text class="r h" x="40" y="234">!</text><text class="t" x="90" y="234">failed / attention</text><text class="s" x="40" y="298">Icon + text required. Color alone never carries meaning.</text></g>
  <g id="transcript-anatomy" transform="translate(50 500)"><rect class="p" width="870" height="330" rx="10"/><text class="s" x="26" y="38">03 · IMMERSIVE TRANSCRIPT RHYTHM</text><text class="x" x="28" y="82">ORACULO LABEL · 12px · coral</text><text class="t" x="28" y="118">Response text sits directly on canvas.</text><text class="b t" x="28" y="170">●</text><text class="t" x="55" y="170">Active tool group</text><line stroke="#4A535C" x1="35" y1="190" x2="35" y2="260"/><text class="g s" x="58" y="216">✓ Read file</text><text class="b s" x="58" y="250">◐ Run tests</text><text class="s" x="28" y="298">No filled panel · 24px turn gap · 8px child indent</text></g>
  <g id="composer-anatomy" transform="translate(980 500)"><rect class="p" width="870" height="330" rx="10"/><text class="s" x="26" y="38">04 · COMPOSER STATES</text><text class="x" x="28" y="82">RESTING</text><line class="line" x1="28" y1="104" x2="842" y2="104"/><text class="s" x="40" y="138">Ask Sylvander…</text><line class="line" x1="28" y1="164" x2="842" y2="164"/><text class="x" x="28" y="210">FOCUSED / STEERING</text><rect class="focus" x="28" y="226" width="814" height="68" rx="5"/><text class="s" x="42" y="267">Steer the current turn…</text></g>
  <g id="sidebar-item" transform="translate(50 880)"><rect class="p" width="870" height="300" rx="10"/><text class="s" x="26" y="38">05 · SIDEBAR ITEM</text><rect fill="#E8796A08" x="28" y="70" width="814" height="64" rx="4"/><rect class="a" x="28" y="70" width="3" height="64"/><text class="b t" x="48" y="98">◐</text><text class="t" x="78" y="98">auth-refactor</text><text class="x" x="78" y="120">acme-api · working 00:42</text><text class="s" x="28" y="178">Active = leading coral rule + brighter text.</text><text class="s" x="28" y="210">Never use a full gray selected rectangle.</text><text class="s" x="28" y="242">Draft dot and execution icon are independent.</text></g>
  <g id="spacing" transform="translate(980 880)"><rect class="p" width="870" height="300" rx="10"/><text class="s" x="26" y="38">06 · SPACING + BORDER POLICY</text><text class="t" x="28" y="86">4  inline glyph gap</text><text class="t" x="28" y="122">8  child indentation</text><text class="t" x="28" y="158">16 component breathing room</text><text class="t" x="28" y="194">24 turn separation</text><text class="t" x="28" y="230">32 major section separation</text><text class="s" x="430" y="86">Borders only:</text><text class="s" x="430" y="122">composer focus</text><text class="s" x="430" y="158">approval / AskUser</text><text class="s" x="430" y="194">palette / inspect overlays</text><text class="r s" x="430" y="242">Never transcript/tool cards</text></g>
</svg>
