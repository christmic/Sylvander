<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1260" viewBox="0 0 1900 1260"><title>Sylvander responsive accessibility matrix</title><defs><style>.bg{fill:#0B0D0F}.p{fill:#111315;stroke:#343A40}.t{fill:#ECE7DE;font:14px Menlo}.h{fill:#ECE7DE;font:700 18px Menlo}.s{fill:#989B9D;font:12px Menlo}.a{fill:#E8796A}.b{fill:#75A7E8}.g{fill:#72C7B1}.y{fill:#D9AF62}.line{stroke:#343A40}</style></defs><rect class="bg" width="1900" height="1260"/><text class="h" x="50" y="52"><tspan class="a">◖S◗</tspan> RESPONSIVE + ACCESSIBILITY CONTRACT</text>
<g id="breakpoints" transform="translate(50 90)"><rect class="p" width="1800" height="470" rx="10"/><text class="s b" x="26" y="38">01 · TERMINAL CELL BREAKPOINTS</text><text class="h" x="26" y="82">Width</text><text class="h" x="190" y="82">Identity</text><text class="h" x="540" y="82">Evidence</text><text class="h" x="1030" y="82">Composer/status</text><text class="h" x="1450" y="82">Sidebar</text><line class="line" x1="26" y1="104" x2="1774" y2="104"/><text class="t" x="26" y="146">120+</text><text class="t" x="190" y="146">full two-line</text><text class="t" x="540" y="146">full result columns</text><text class="t" x="1030" y="146">full hints</text><text class="t" x="1450" y="146">28–32 cols</text><text class="t" x="26" y="202">100–119</text><text class="t" x="190" y="202">short metadata</text><text class="t" x="540" y="202">summaries retained</text><text class="t" x="1030" y="202">reduced hints</text><text class="t" x="1450" y="202">24–28 cols</text><text class="t" x="26" y="258">80–99</text><text class="t" x="190" y="258">title + path</text><text class="t" x="540" y="258">duration below row</text><text class="t" x="1030" y="258">one status row</text><text class="t" x="1450" y="258">22–24 / rail</text><text class="t" x="26" y="314">60–79</text><text class="t" x="190" y="314">compact mark</text><text class="t" x="540" y="314">single column</text><text class="t" x="1030" y="314">context + mode</text><text class="t" x="1450" y="314">state rail</text><text class="t" x="26" y="370">40–59</text><text class="t" x="190" y="370">S ›</text><text class="t" x="540" y="370">middle-elided paths</text><text class="t" x="1030" y="370">overlay help</text><text class="t" x="1450" y="370">temporary</text><text class="y t" x="26" y="426">&lt;40</text><text class="t" x="190" y="426">resize/recovery</text><text class="t" x="540" y="426">no corrupted UI</text><text class="t" x="1030" y="426">draft accessible</text><text class="t" x="1450" y="426">hidden</text></g>
<g id="fallback" transform="translate(50 610)"><rect class="p" width="880" height="570" rx="10"/><text class="s g" x="26" y="38">02 · FALLBACK TIERS</text><text class="t" x="26" y="88"><tspan class="a">◖S◗</tspan> Unicode mark   →   [S] ASCII mark</text><text class="t" x="26" y="136"><tspan class="b">◐ working</tspan>      →   ~ working</text><text class="t" x="26" y="184"><tspan class="g">✓ verified</tspan>     →   OK verified</text><text class="t" x="26" y="232">truecolor         →   ANSI 256   →   monochrome</text><text class="t" x="26" y="280">spinner           →   working · 00:18</text><text class="t" x="26" y="328">image preview     →   PNG · 1280×720 · path</text><line class="line" x1="26" y1="366" x2="854" y2="366"/><text class="s" x="26" y="410">Screen reader: stable regions + linear narration.</text><text class="s" x="26" y="448">Reduced motion: no animated rewrite or pulsing status.</text><text class="s" x="26" y="486">CJK/emoji: measure grapheme clusters in terminal cells.</text><text class="s" x="26" y="524">Paths: middle-elide while preserving unique filename suffix.</text></g>
<g id="monochrome" transform="translate(980 610)"><rect class="p" width="870" height="570" rx="10"/><text class="s" x="26" y="38">03 · 40-COL MONOCHROME APPROVAL</text><text class="h" x="26" y="84">PERMISSION REQUIRED</text><text class="t" x="26" y="128">Run command</text><text class="t" x="26" y="162">cargo test --workspace</text><text class="s" x="26" y="202">~/Projects/acme-api</text><text class="t" x="26" y="250">Risk: writes target/ artifacts</text><line class="line" x1="26" y1="282" x2="844" y2="282"/><text class="t" x="26" y="326">&gt; 1 Allow once</text><text class="t" x="26" y="368">  2 Allow cargo test prefix</text><text class="t" x="26" y="410">  3 Reject with feedback</text><line class="line" x1="26" y1="446" x2="844" y2="446"/><text class="s" x="26" y="490">No color required to identify action, risk,</text><text class="s" x="26" y="518">selection, scope, or destructive outcome.</text></g></svg>
