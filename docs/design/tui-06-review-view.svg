<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1380" viewBox="0 0 1800 1380">
  <title>Sylvander TUI — Review View</title>
  <defs><style>
    .page{fill:#0B0B0D}.screen{fill:#000;stroke:#343A40;stroke-width:1}.text{fill:#ECE7DE}.dim{fill:#989B9D}.muted{fill:#666C72}.warm{fill:#F0BE72}.violet{fill:#9B72FF}.active{fill:#75A7E8}.ok{fill:#72C7B1}.wait{fill:#D9AF62}.danger{fill:#E06C75}.added{fill:#72C7B1}.removed{fill:#E06C75}.rule{stroke:#343A40;stroke-width:1}
    .title{font:700 28px Inter,system-ui,sans-serif}.subtitle{font:15px Inter,system-ui,sans-serif}.head{font:700 18px Inter,system-ui,sans-serif}.mono{font:15px 'SFMono-Regular',Menlo,monospace;white-space:pre}.monoBold{font:700 15px 'SFMono-Regular',Menlo,monospace;white-space:pre}.small{font:12px 'SFMono-Regular',Menlo,monospace;white-space:pre}.note{font:13px Inter,system-ui,sans-serif}
  </style></defs>
  <rect class="page" width="1800" height="1380"/>
  <text class="title text" x="50" y="52">SYLVANDER TUI · REVIEW VIEW</text>
  <text class="subtitle dim" x="50" y="80">Plans are not duplicated; long material temporarily uses the transcript viewport and finishes in a Decision Dock.</text>

  <g id="plan-accept" transform="translate(50 112)">
    <text class="head violet">01 · PLAN APPEARS ONCE · ACCEPTANCE STAYS AT THE BOTTOM</text>
    <rect class="screen" y="20" width="1700" height="440" rx="8"/>
    <g class="mono" transform="translate(22 58)">
      <text class="dim">›</text><text class="text" x="30">improve the approval interaction</text>
      <text class="violet" y="36">◆</text><text class="text" x="30" y="36">Proposed plan</text>
      <text class="ok" x="30" y="72">✓ 1. Preserve the single-session shell</text>
      <text class="active" x="30" y="104">● 2. Replace centered approval with a Decision Dock</text>
      <text class="dim" x="30" y="136">○ 3. Add tool-specific previews</text>
      <text class="dim" x="30" y="168">○ 4. Verify standard and narrow layouts</text>
    </g>
    <g id="plan-decision-dock">
      <line class="rule" x1="0" y1="268" x2="1700" y2="268"/>
      <text class="monoBold violet" x="22" y="300">◆ Ready to proceed?</text>
      <text class="monoBold violet" x="22" y="334">› 1. Start implementation</text>
      <text class="mono text" x="22" y="364">  2. Revise the plan</text>
      <text class="mono text" x="22" y="394">  3. Cancel</text>
      <line class="rule" x1="0" y1="410" x2="1700" y2="410"/>
      <text class="small muted" x="0" y="436">● plan review · 4 steps</text><text class="small muted" x="1450" y="436">↑↓ select   ↵ confirm   esc cancel</text>
    </g>
    <g transform="translate(1190 64)">
      <text class="note violet">NO SECOND PLAN CARD</text>
      <text class="note dim" y="30">The transcript already contains the plan.</text>
      <text class="note dim" y="54">The Dock asks only for the next decision.</text>
    </g>
  </g>

  <g id="plan-editor" transform="translate(50 626)">
    <text class="head violet">02 · EXPLICIT PLAN EDITING</text>
    <rect class="screen" y="20" width="825" height="650" rx="8"/>
    <g id="plan-review-header">
      <text class="monoBold violet" x="22" y="58">Plan editor</text><text class="small muted" x="644" y="58">4 steps</text>
      <line class="rule" x1="0" y1="78" x2="825" y2="78"/>
    </g>
    <g id="plan-review-content" class="mono" transform="translate(22 116)">
      <text class="ok">✓ 1  Preserve the single-session shell</text>
      <text class="monoBold violet" y="58">› 2  Replace centered approval with a Decision Dock</text>
      <text class="small dim" x="34" y="84">approval · AskUser · simple confirmations</text>
      <text class="text" y="130">  3  Add tool-specific previews</text>
      <text class="text" y="172">  4  Verify standard and narrow layouts</text>
      <text class="small muted" y="230">e edit step   a add below   d remove   j/k move</text>
    </g>
    <g id="plan-editor-input">
      <line class="rule" x1="0" y1="500" x2="825" y2="500"/>
      <text class="mono text" x="0" y="536">&gt; Replace approval and questions with Decision Dock</text>
      <line class="rule" x1="0" y1="566" x2="825" y2="566"/>
      <text class="small muted" x="0" y="596">● editing step 2</text><text class="small muted" x="574" y="596">↵ save   esc discard</text>
      <text class="small dim" x="22" y="630">Closing returns to the same transcript and plan decision.</text>
    </g>
  </g>

  <g id="diff-review" transform="translate(925 626)">
    <text class="head violet">03 · DIFF REVIEW AND ROLLBACK CONFIRMATION</text>
    <rect class="screen" y="20" width="825" height="650" rx="8"/>
    <g id="diff-header">
      <text class="monoBold violet" x="22" y="58">Review changes</text><text class="small muted" x="574" y="58">2 files · 18 lines</text>
      <line class="rule" x1="0" y1="78" x2="825" y2="78"/>
    </g>
    <g id="diff-content" class="mono" transform="translate(22 112)">
      <text class="text">sylvander-tui/src/modal/approval.rs</text>
      <text class="small muted" y="28">@@ decision surface @@</text>
      <text class="removed" y="64">- let area = centered_rect(72, height, parent);</text>
      <text class="added" y="94">+ let area = decision_dock(parent, content_height);</text>
      <text class="added" y="124">+ restore_saved_composer_on_close();</text>
      <text class="text" y="176">sylvander-tui/src/modal/ask_user.rs</text>
      <text class="small muted" y="204">@@ product copy @@</text>
      <text class="removed" y="240">- Agent asks (single-select)</text>
      <text class="added" y="270">+ One choice needed</text>
    </g>
    <g id="rollback-dock">
      <line class="rule" x1="0" y1="438" x2="825" y2="438"/>
      <text class="monoBold danger" x="22" y="470">◆ Restore these two files?</text>
      <text class="small dim" x="22" y="496">Conversation history is unchanged. Uncommitted Agent edits are replaced.</text>
      <text class="monoBold danger" x="22" y="530">› 1. Keep current files</text>
      <text class="mono text" x="22" y="560">  2. Restore the previewed Agent turn</text>
      <line class="rule" x1="0" y1="584" x2="825" y2="584"/>
      <text class="small danger" x="0" y="612">● rollback confirmation</text><text class="small muted" x="572" y="612">↑↓ select  ↵ confirm</text>
      <text class="small dim" x="22" y="638">The destructive choice is never selected by default.</text>
    </g>
  </g>
</svg>
