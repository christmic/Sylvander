<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1260" viewBox="0 0 1900 1260"><title>Sylvander focus shortcuts and ownership</title><defs><style>.bg{fill:#0B0D0F}.p{fill:#111315;stroke:#343A40}.t{fill:#ECE7DE;font:14px Menlo}.h{fill:#ECE7DE;font:700 18px Menlo}.s{fill:#989B9D;font:12px Menlo}.a{fill:#E8796A}.b{fill:#75A7E8}.g{fill:#72C7B1}.y{fill:#D9AF62}.r{fill:#E06C75}.line{stroke:#343A40}.sel{fill:#E8796A08;stroke:#E8796A}</style></defs><rect class="bg" width="1900" height="1260"/><text class="h" x="50" y="52"><tspan class="a">◖S◗</tspan> INTERACTION CONTRACT · FOCUS / SHORTCUTS / OWNERSHIP</text>
<g id="focus" transform="translate(50 90)"><rect class="p" width="850" height="520" rx="10"/><text class="s r" x="26" y="38">01 · BLOCKING FOCUS PRECEDENCE</text><rect class="sel" x="24" y="72" width="802" height="48" rx="5"/><text class="t" x="42" y="102">1  Destructive / invalidated approval</text><text class="t" x="42" y="154">2  AskUser required to continue</text><text class="t" x="42" y="206">3  Draft or recovery conflict</text><text class="t" x="42" y="258">4  Palette / search / inspect overlay</text><text class="t" x="42" y="310">5  Composer</text><text class="t" x="42" y="362">6  Transcript navigation</text><line class="line" x1="26" y1="402" x2="824" y2="402"/><text class="s" x="26" y="442">Esc returns to exact prior focus + selection + scroll.</text><text class="s" x="26" y="476">Disconnect freezes decisions; it never dismisses them.</text></g>
<g id="shortcuts" transform="translate(950 90)"><rect class="p" width="900" height="520" rx="10"/><text class="s b" x="26" y="38">02 · SHORTCUT OWNERSHIP</text><text class="h" x="26" y="82">Ghostty shell</text><text class="t" x="26" y="122">⌘T new session · ⌘K sidebar search · ⌘W hide view</text><text class="t" x="26" y="158">⇧⌘S toggle sidebar · Ctrl+Tab next session</text><text class="h" x="26" y="216">TUI</text><text class="t" x="26" y="256">Enter send · ⇧Enter newline · Ctrl+R history</text><text class="t" x="26" y="292">Esc interrupt/back · Ctrl+T tasks · / commands</text><text class="h" x="26" y="350">IME override</text><text class="y t" x="26" y="390">Enter confirms candidate and never sends while composing</text><line class="line" x1="26" y1="424" x2="874" y2="424"/><text class="s" x="26" y="464">Collision → disable lower-priority binding + explain in settings.</text></g>
<g id="ownership" transform="translate(50 660)"><rect class="p" width="1800" height="520" rx="10"/><text class="s g" x="26" y="38">03 · STATE OWNERSHIP</text><text class="h" x="26" y="84">State</text><text class="h" x="570" y="84">Owner</text><text class="h" x="900" y="84">Persistence</text><text class="h" x="1270" y="84">Reconciliation</text><line class="line" x1="26" y1="106" x2="1774" y2="106"/><text class="t" x="26" y="148">Agent execution + tools</text><text class="b t" x="570" y="148">Server</text><text class="t" x="900" y="148">Durable event cursor</text><text class="s" x="1270" y="148">Resume from acknowledged cursor</text><text class="t" x="26" y="204">History / plan / checkpoint</text><text class="b t" x="570" y="204">Server</text><text class="t" x="900" y="204">Durable store</text><text class="s" x="1270" y="204">Server authoritative</text><text class="t" x="26" y="260">Draft + versions</text><text class="y t" x="570" y="260">Server-backed client edit</text><text class="t" x="900" y="260">Per session</text><text class="s" x="1270" y="260">Merge linked-view conflict</text><text class="t" x="26" y="316">Sidebar selection / order</text><text class="a t" x="570" y="316">Ghostty window</text><text class="t" x="900" y="316">Window preferences</text><text class="s" x="1270" y="316">Local window state</text><text class="t" x="26" y="372">Scroll / selection / expand</text><text class="g t" x="570" y="372">TUI view</text><text class="t" x="900" y="372">Per-view session state</text><text class="s" x="1270" y="372">Restore on view switch</text><text class="t" x="26" y="428">IME composition</text><text class="t" x="570" y="428">OS input client</text><text class="t" x="900" y="428">Ephemeral</text><text class="s" x="1270" y="428">Never persisted as committed text</text></g></svg>
