<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="1260" viewBox="0 0 2000 1260"><title>Sylvander brand refinement to Convergence Core</title><defs><style>.bg{fill:#090B0E}.card{fill:#111419;stroke:#2C323B}.t{fill:#F0ECE4;font:15px Menlo}.h{fill:#F0ECE4;font:700 22px Menlo}.s{fill:#9299A5;font:12px Menlo}.v{fill:#9B8CFF}.c{fill:#FF806F}.q{fill:#6DD6E8}.line{stroke:#38414D}.violet{fill:none;stroke:#9B8CFF;stroke-width:8;stroke-linecap:round;stroke-linejoin:round}.cyan{fill:none;stroke:#6DD6E8;stroke-width:8;stroke-linecap:round;stroke-linejoin:round}</style><symbol id="converge" viewBox="0 0 300 220"><circle cx="38" cy="48" r="9" fill="#9B8CFF"/><circle cx="38" cy="110" r="9" fill="#9B8CFF"/><circle cx="38" cy="172" r="9" fill="#9B8CFF"/><path class="violet" d="M50 48C92 48 96 88 132 102M50 110H132M50 172C92 172 96 132 132 118"/><path d="M132 110L168 74L204 110L168 146Z" fill="#FF806F"/><circle cx="168" cy="110" r="10" fill="#F0ECE4"/><path class="cyan" d="M204 110H264M238 82L270 110L238 138"/></symbol></defs><rect class="bg" width="2000" height="1260"/><text class="h" x="70" y="64">SYLVANDER · FINAL BRAND REFINEMENT</text><text class="s" x="70" y="94">remove generic container · expose orchestration · make directed agency unmistakable</text>
<g id="comparison" transform="translate(70 140)"><rect class="card" width="1860" height="440" rx="16"/><text class="v t" x="30" y="42">01 · CONCEPT EVOLUTION</text><g transform="translate(90 100)"><path class="violet" d="M20 110L68 44H160L208 110L160 176H68L20 110Z"/><path class="cyan" d="M160 62L224 110L160 158"/><path d="M88 110L116 82L144 110L116 138Z" fill="#FF806F"/><text class="h" x="280" y="96">Vector Core</text><text class="s" x="280" y="130">Clear but container-like</text><text class="s" x="280" y="160">Reads as infrastructure</text></g><path d="M850 210H1000" stroke="#38414D" stroke-width="2"/><path d="M980 194L1000 210L980 226" fill="none" stroke="#6DD6E8" stroke-width="4"/><g transform="translate(1080 90)"><use href="#converge" width="360" height="264"/><text class="h" x="410" y="120">Convergence Core</text><text class="s" x="410" y="154">Context + tools + subagents converge</text><text class="s" x="410" y="184">Decision becomes forward action</text><text class="c t" x="410" y="224">RECOMMENDED FINAL</text></g></g>
<g id="wordmark" transform="translate(70 640)"><rect class="card" width="1180" height="500" rx="16"/><text class="q t" x="30" y="42">02 · FINAL WORDMARK</text><use href="#converge" x="60" y="120" width="420" height="310"/><text x="520" y="255" fill="#F0ECE4" font-family="Menlo" font-size="46" font-weight="700" letter-spacing="5">SYLVANDER</text><text class="s" x="525" y="298">AGENT WORKSPACE</text><text class="t" x="525" y="360"><tspan class="v">CONTEXT</tspan>  →  <tspan class="c">JUDGMENT</tspan>  →  <tspan class="q">ACTION</tspan></text><text class="s" x="525" y="410">Many signals. One deliberate path forward.</text></g>
<g id="small" transform="translate(1320 640)"><rect class="card" width="610" height="500" rx="16"/><text class="v t" x="30" y="42">03 · SCALE + TERMINAL</text><use href="#converge" x="80" y="82" width="380" height="280"/><text class="t" x="70" y="390"><tspan class="v">◆</tspan><tspan class="q">›</tspan>  Unicode</text><text class="t" x="270" y="390">[o]&gt;  ASCII</text><text class="s" x="70" y="438">At small sizes: decision core + vector</text><text class="s" x="70" y="468">Input nodes become optional detail</text></g></svg>
