<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1240" viewBox="0 0 1900 1240">
  <title>Sylvander steer queue interrupt flows</title><defs><style>.bg{fill:#0B0D0F}.p{fill:#111315;stroke:#343A40}.t{fill:#ECE7DE;font:14px Menlo,monospace}.h{fill:#ECE7DE;font:700 18px Menlo,monospace}.s{fill:#989B9D;font:12px Menlo,monospace}.x{fill:#666C72;font:11px Menlo,monospace}.a{fill:#E8796A}.b{fill:#75A7E8}.g{fill:#72C7B1}.y{fill:#D9AF62}.r{fill:#E06C75}.line{stroke:#343A40}.sel{fill:#E8796A08;stroke:#E8796A}</style></defs><rect class="bg" width="1900" height="1240"/><text class="h" x="50" y="52"><tspan class="a">◖S◗</tspan> EXECUTION CONTROL · STEER / QUEUE / INTERRUPT</text>
  <g id="intent-chooser" transform="translate(50 90)"><rect class="p" width="870" height="410" rx="10"/><text class="s b" x="26" y="38">01 · SUBMIT WHILE WORKING</text><text class="t" x="26" y="82">“Use the existing AuthenticatedUser type.”</text><text class="s" x="26" y="122">The agent is between tool calls. How should this message apply?</text><rect class="sel" x="20" y="150" width="830" height="50" rx="5"/><text class="t" x="38" y="181"><tspan class="a">›</tspan> Steer current turn <tspan class="s">· recommended</tspan></text><text class="t" x="38" y="236">  Queue as next turn</text><text class="t" x="38" y="286">  Interrupt current work and run now</text><line class="line" x1="26" y1="320" x2="844" y2="320"/><text class="s" x="26" y="360">shift+enter default · alt+enter choose · ctrl+enter interrupt</text></g>
  <g id="queue" transform="translate(980 90)"><rect class="p" width="870" height="410" rx="10"/><text class="s y" x="26" y="38">02 · QUEUED PROMPTS</text><text class="h" x="26" y="80">After current turn</text><text class="t" x="26" y="128"><tspan class="a">1</tspan> Add migration notes to the report</text><text class="s" x="50" y="154">2 attachments · normal mode</text><text class="t" x="26" y="204"><tspan class="a">2</tspan> Run the complete workspace tests</text><text class="s" x="50" y="230">approval may be required</text><text class="t" x="26" y="280"><tspan class="a">3</tspan> Summarize changed public APIs</text><line class="line" x1="26" y1="318" x2="844" y2="318"/><text class="s" x="26" y="358">e edit · alt+↑↓ reorder · d remove · i promote to interrupt</text></g>
  <g id="interrupt-flow" transform="translate(50 550)"><rect class="p" width="870" height="600" rx="10"/><text class="s r" x="26" y="38">03 · INTERRUPT BOUNDARY</text><text class="b t" x="26" y="84">◐ Running cargo test --workspace</text><text class="s" x="26" y="116">PID 18420 · cancellable · 18s</text><text class="r t" x="26" y="170">! Interrupt requested</text><text class="s" x="26" y="202">Sending SIGINT and waiting up to 5s…</text><line class="line" x1="26" y1="238" x2="844" y2="238"/><text class="g t" x="26" y="286">✓ 3 earlier tool actions completed</text><text class="y t" x="26" y="326">! 2 files changed before interruption</text><text class="t" x="26" y="378">The interruption does not roll back filesystem changes.</text><rect class="sel" x="20" y="410" width="830" height="46" rx="5"/><text class="t" x="38" y="439"><tspan class="a">›</tspan> Inspect changes</text><text class="t" x="38" y="486">  Revert selected changes…</text><text class="t" x="38" y="530">  Continue from current state</text><text class="s" x="26" y="574">Replacement prompt starts after this boundary is recorded.</text></g>
  <g id="noninterruptible" transform="translate(980 550)"><rect class="p" width="870" height="600" rx="10"/><text class="s y" x="26" y="38">04 · NON-INTERRUPTIBLE ACTION</text><text class="y t" x="26" y="84">◐ Publishing release metadata</text><text class="s" x="26" y="118">Atomic remote operation · cancellation unsafe</text><text class="r t" x="26" y="176">! Interrupt requested · waiting for safe boundary</text><line class="line" x1="26" y1="210" x2="844" y2="210"/><text class="t" x="26" y="258">Still running</text><text class="s" x="26" y="290">Finalize remote transaction</text><text class="t" x="26" y="344">Next safe boundary</text><text class="s" x="26" y="376">After server acknowledgement · usually under 10s</text><text class="t" x="26" y="430">Your replacement instruction is preserved.</text><text class="s" x="26" y="462">It will run only after the action reaches a known state.</text><line class="line" x1="26" y1="506" x2="844" y2="506"/><text class="s" x="26" y="548">v view live evidence · c copy operation ID · esc dismiss detail</text></g>
</svg>
