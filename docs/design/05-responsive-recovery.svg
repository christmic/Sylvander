<svg xmlns="http://www.w3.org/2000/svg" width="1840" height="1120" viewBox="0 0 1840 1120">
  <title>Sylvander responsive and recovery states</title><defs><style>.bg{fill:#0B0D0F}.p{fill:#111315;stroke:#343A40}.t{fill:#ECE7DE;font:14px Menlo,monospace}.h{fill:#ECE7DE;font:700 18px Menlo,monospace}.s{fill:#989B9D;font:12px Menlo,monospace}.x{fill:#666C72;font:11px Menlo,monospace}.a{fill:#E8796A}.b{fill:#75A7E8}.g{fill:#72C7B1}.y{fill:#D9AF62}.r{fill:#E06C75}.line{stroke:#343A40}</style></defs><rect class="bg" width="1840" height="1120"/><text class="h" x="50" y="52"><tspan class="a">◖S◗</tspan> RESPONSIVE + RECOVERY</text>
  <g id="first-launch" transform="translate(50 90)"><rect class="p" width="820" height="450" rx="10"/><text class="s" x="28" y="38">01 · FIRST LAUNCH / STANDARD</text><text class="h" text-anchor="middle" x="410" y="126"><tspan class="a">◖S◗</tspan> SYLVANDER</text><text class="s" text-anchor="middle" x="410" y="154">intelligent terminal workspace</text><text class="h" text-anchor="middle" x="410" y="226">What are we building today?</text><text class="t" text-anchor="middle" x="410" y="292">Open workspace   ·   Resume session   ·   Ask anything</text><text class="s" text-anchor="middle" x="410" y="348">~/Projects/acme-api · sonnet · plan mode</text><text class="x" text-anchor="middle" x="410" y="406">/help commands · work stays with this session</text></g>
  <g id="narrow" transform="translate(930 90)"><rect class="p" width="360" height="890" rx="10"/><text class="s" x="20" y="34">02 · NARROW / 50 COLS</text><text class="h" x="20" y="78"><tspan class="a">S ›</tspan> auth-refactor</text><text class="x" x="20" y="101">~/acme-api · feat/auth</text><line class="line" x1="20" y1="122" x2="340" y2="122"/><text class="x" x="20" y="166">YOU</text><text class="t" x="20" y="194">Add JWT authentication.</text><text class="x a" x="20" y="246">ORACULO</text><text class="t" x="20" y="274">I’ll inspect the existing</text><text class="t" x="20" y="298">middleware first.</text><text class="b t" x="20" y="354">● Exploring</text><text class="g s" x="38" y="390">✓ Read router.rs</text><text class="g s" x="38" y="422">✓ Read auth/mod.rs</text><text class="b s" x="38" y="454">◐ Search callers</text><text class="t" x="20" y="518">The cookie flow already has</text><text class="t" x="20" y="542">a reusable identity boundary.</text><line class="line" x1="20" y1="740" x2="340" y2="740"/><text class="s" x="20" y="778">Ask Sylvander…</text><line class="line" x1="20" y1="820" x2="340" y2="820"/><text class="s b" x="20" y="858">working · ctx 24%</text></g>
  <g id="disconnect" transform="translate(50 590)"><rect class="p" width="820" height="390" rx="10"/><text class="s y" x="28" y="38">03 · DISCONNECTED / DRAFT PRESERVED</text><text class="y t" x="28" y="82">! Server disconnected · reconnecting in 2s</text><line class="line" x1="28" y1="108" x2="792" y2="108"/><text class="x" x="28" y="152">Last confirmed event</text><text class="t" x="28" y="184">✓ Read src/auth/mod.rs</text><text class="x" x="28" y="234">Queued draft</text><text class="t" x="28" y="266">Continue with the JWT verifier after reconnecting.</text><line class="line" x1="28" y1="302" x2="792" y2="302"/><text class="s" x="28" y="344">r retry now · w work offline · c copy draft · esc dismiss banner</text></g>
  <g id="rail-collapsed" transform="translate(1350 90)"><rect class="p" width="440" height="890" rx="10"/><text class="s" x="20" y="34">04 · GHOSTTY FOCUS MODE</text><rect fill="#0D0F11" x="0" y="54" width="54" height="836"/><text class="a t" x="17" y="96">S</text><text class="b t" x="17" y="150">◐</text><text class="y t" x="17" y="202">●</text><text class="g t" x="17" y="254">✓</text><text class="s" x="82" y="100">Sidebar collapses to a state rail.</text><text class="s" x="82" y="132">Hover/focus reveals titles temporarily.</text><text class="s" x="82" y="188">Conversation width remains stable;</text><text class="s" x="82" y="220">no transcript reflow during peek.</text><line class="line" x1="82" y1="270" x2="414" y2="270"/><text class="x" x="82" y="306">⇧⌘S pin sidebar</text><text class="x" x="82" y="336">⌘K search sessions</text></g>
</svg>
