<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1320" viewBox="0 0 1900 1320"><title>Sylvander overlay UI system</title><defs><style>.bg{fill:#0B0D0F}.p{fill:#111315;stroke:#343A40}.o{fill:#1A1E22;stroke:#4A535C}.t{fill:#ECE7DE;font:14px Menlo}.h{fill:#ECE7DE;font:700 18px Menlo}.s{fill:#989B9D;font:12px Menlo}.x{fill:#666C72;font:11px Menlo}.a{fill:#E8796A}.b{fill:#75A7E8}.g{fill:#72C7B1}.y{fill:#D9AF62}.r{fill:#E06C75}.line{stroke:#343A40}.sel{fill:#E8796A08;stroke:#E8796A}</style></defs><rect class="bg" width="1900" height="1320"/><text class="h" x="50" y="52"><tspan class="a">◖S◗</tspan> OVERLAY SYSTEM · DECIDE / ASK / SEARCH / SWITCH</text>
<g id="approval" transform="translate(50 90)"><rect class="p" width="880" height="540" rx="10"/><text class="s y" x="26" y="38">01 · APPROVAL</text><rect class="o" x="110" y="72" width="660" height="410" rx="8"/><text class="y s" x="136" y="108">PERMISSION REQUIRED</text><text class="h" x="136" y="150">Run cargo test --workspace</text><text class="s" x="136" y="186">~/Projects/acme-api</text><text class="t" x="136" y="234">Effect</text><text class="s" x="136" y="262">Writes build artifacts under target/</text><line class="line" x1="136" y1="294" x2="744" y2="294"/><rect class="sel" x="128" y="312" width="624" height="42" rx="4"/><text class="t" x="144" y="339"><tspan class="a">›</tspan> Allow once</text><text class="t" x="144" y="382">  Allow cargo test in this workspace</text><text class="t" x="144" y="424">  Reject with feedback</text><text class="x" x="136" y="462">smallest scope selected by default</text></g>
<g id="ask" transform="translate(980 90)"><rect class="p" width="870" height="540" rx="10"/><text class="s b" x="26" y="38">02 · ASKUSER</text><rect class="o" x="105" y="72" width="660" height="410" rx="8"/><text class="b s" x="131" y="108">SYLVANDER ASKS</text><text class="h" x="131" y="150">Which platforms are required?</text><rect class="sel" x="123" y="180" width="624" height="42" rx="4"/><text class="t" x="139" y="207"><tspan class="a">›</tspan> macOS 15+</text><text class="t" x="139" y="250">  Linux / Wayland</text><text class="t" x="139" y="293">  Windows preview</text><text class="t" x="139" y="336">  Write another answer…</text><line class="line" x1="131" y1="370" x2="739" y2="370"/><text class="x" x="131" y="414">space multi-select · f free text · enter answer</text></g>
<g id="palette" transform="translate(50 680)"><rect class="p" width="880" height="560" rx="10"/><text class="s a" x="26" y="38">03 · CONTEXTUAL COMMAND PALETTE</text><rect class="o" x="80" y="78" width="720" height="400" rx="8"/><text class="h" x="106" y="120">/mo_</text><line class="line" x1="106" y1="142" x2="774" y2="142"/><text class="x" x="106" y="176">SUGGESTED</text><rect class="sel" x="98" y="192" width="684" height="42" rx="4"/><text class="t" x="114" y="219"><tspan class="a">›</tspan> /model  <tspan class="s">Change model</tspan></text><text class="x" x="106" y="268">SESSION</text><text class="t" x="114" y="306">/mode     <tspan class="s">Switch behavior</tspan></text><text class="t" x="114" y="346">/compact  <tspan class="s">Manage context</tspan></text><text class="x" x="106" y="386">WORKSPACE</text><text class="t" x="114" y="424">/review   <tspan class="s">Inspect changes</tspan></text><text class="x" x="106" y="458">Unavailable commands stay searchable with explanation.</text></g>
<g id="switcher" transform="translate(980 680)"><rect class="p" width="870" height="560" rx="10"/><text class="s g" x="26" y="38">04 · SESSION SWITCHER</text><rect class="o" x="70" y="78" width="730" height="400" rx="8"/><text class="h" x="96" y="120">⌕ auth_</text><line class="line" x1="96" y1="142" x2="774" y2="142"/><rect class="sel" x="88" y="164" width="694" height="58" rx="4"/><text class="b t" x="104" y="190">◐</text><text class="t" x="136" y="190">auth-refactor</text><text class="x" text-anchor="end" x="758" y="190">working · acme-api</text><text class="y t" x="104" y="254">●</text><text class="t" x="136" y="254">api-review</text><text class="x" text-anchor="end" x="758" y="254">approval</text><text class="t" x="136" y="318">auth-debug</text><text class="x" text-anchor="end" x="758" y="318">yesterday</text><line class="line" x1="96" y1="352" x2="774" y2="352"/><text class="x" x="96" y="390">enter open · ctrl+enter new window · esc close</text><text class="x" x="96" y="430">Upper-middle placement preserves transcript context below.</text></g></svg>
