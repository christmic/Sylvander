<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1240" viewBox="0 0 1900 1240">
  <title>Sylvander Permission Center</title><defs><style>.bg{fill:#0B0D0F}.p{fill:#111315;stroke:#343A40}.nav{fill:#0D0F11}.t{fill:#ECE7DE;font:14px Menlo,monospace}.h{fill:#ECE7DE;font:700 18px Menlo,monospace}.s{fill:#989B9D;font:12px Menlo,monospace}.x{fill:#666C72;font:11px Menlo,monospace}.a{fill:#E8796A}.b{fill:#75A7E8}.g{fill:#72C7B1}.y{fill:#D9AF62}.r{fill:#E06C75}.line{stroke:#343A40}.sel{fill:#E8796A08}.pill{fill:#1A1E22;stroke:#4A535C}</style></defs><rect class="bg" width="1900" height="1240"/><text class="h" x="50" y="52"><tspan class="a">◖S◗</tspan> PERMISSION CENTER · SCOPES + AUDIT</text>
  <g id="center" transform="translate(50 90)"><rect class="p" width="1800" height="710" rx="10"/><rect class="nav" width="330" height="710" rx="10"/><text class="h" x="26" y="46">Permissions</text><rect class="sel" x="12" y="76" width="306" height="48" rx="4"/><text class="y t" x="28" y="106">● Pending decisions</text><rect class="pill" x="268" y="88" width="34" height="22" rx="11"/><text class="x" text-anchor="middle" x="285" y="104">3</text><text class="t" x="28" y="166">Session rules</text><text class="t" x="28" y="210">Workspace rules</text><text class="t" x="28" y="254">Global rules</text><text class="t" x="28" y="298">Decision history</text><text class="x" x="28" y="668">approval mode · on request</text>
    <g transform="translate(370 40)"><text class="h" y="0">Pending decisions</text><text class="s" y="34">Ordered by dependency and risk</text><line class="line" x1="0" y1="58" x2="1390" y2="58"/><text class="r t" y="106">!</text><text class="t" x="30" y="106">Deploy release to production</text><text class="s" x="30" y="132">destructive · external · must review separately</text><text class="x" text-anchor="end" x="1370" y="106">api-release · 2m</text><line class="line" x1="0" y1="160" x2="1390" y2="160"/><text class="y t" y="208">●</text><text class="t" x="30" y="208">Run cargo test --workspace</text><text class="s" x="30" y="234">local command · writes build artifacts</text><text class="x" text-anchor="end" x="1370" y="208">auth-refactor · now</text><line class="line" x1="0" y1="262" x2="1390" y2="262"/><text class="b t" y="310">●</text><text class="t" x="30" y="310">Read 4 files under docs/</text><text class="s" x="30" y="336">independent read-only batch · MCP docs-server</text><text class="x" text-anchor="end" x="1370" y="310">research · now</text><line class="line" x1="0" y1="376" x2="1390" y2="376"/><text class="x" y="420">SELECTED DECISION</text><text class="t" y="454">Exact action   cargo test --workspace</text><text class="t" y="488">Directory      ~/Projects/acme-api</text><text class="t" y="522">Provenance     Built-in command tool</text><text class="t" y="556">Risk           local write · target/ only</text><rect class="sel" x="0" y="588" width="1390" height="42" rx="4"/><text class="t" x="16" y="615"><tspan class="a">›</tspan> Allow once</text><text class="s" x="0" y="662">s session · w workspace rule · r reject with feedback · enter confirm</text></g></g>
  <g id="rule-detail" transform="translate(50 850)"><rect class="p" width="880" height="330" rx="10"/><text class="s g" x="26" y="38">WORKSPACE RULE · ACTIVE</text><text class="h" x="26" y="80">Allow writes under docs/</text><text class="t" x="26" y="124">Workspace   ~/Projects/Sylvander</text><text class="t" x="26" y="160">Matcher     path starts with docs/</text><text class="t" x="26" y="196">Origin      approved by christmix · Jul 11</text><text class="t" x="26" y="232">Last used   3 minutes ago · 12 uses</text><line class="line" x1="26" y1="256" x2="854" y2="256"/><text class="r s" x="26" y="296">revoke rule</text><text class="s" x="154" y="296">view matching history</text></g>
  <g id="invalidated" transform="translate(980 850)"><rect class="p" width="870" height="330" rx="10"/><text class="s r" x="26" y="38">APPROVAL INVALIDATED</text><text class="h" x="26" y="80">The command changed after review</text><text class="s" x="26" y="124">Reviewed</text><text class="t" x="126" y="124">cargo test --workspace</text><text class="s" x="26" y="166">Now</text><text class="r t" x="126" y="166">cargo test --workspace -- --ignored</text><text class="s" x="26" y="208">Reason</text><text class="t" x="126" y="208">arguments and expected duration changed</text><line class="line" x1="26" y1="244" x2="844" y2="244"/><text class="s" x="26" y="286">Review replacement · previous approval cannot be reused</text></g>
</svg>
