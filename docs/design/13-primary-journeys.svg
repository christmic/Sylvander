<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1240" viewBox="0 0 1900 1240"><title>Sylvander primary end to end journeys</title><defs><style>.bg{fill:#0B0D0F}.p{fill:#111315;stroke:#343A40}.t{fill:#ECE7DE;font:14px Menlo}.h{fill:#ECE7DE;font:700 18px Menlo}.s{fill:#989B9D;font:12px Menlo}.a{fill:#E8796A}.b{fill:#75A7E8}.g{fill:#72C7B1}.y{fill:#D9AF62}.r{fill:#E06C75}.l{stroke:#4A535C;fill:none}.n{fill:#1A1E22;stroke:#4A535C}</style><marker id="m" markerWidth="8" markerHeight="8" refX="7" refY="4"><path d="M0 0L8 4L0 8Z" fill="#4A535C"/></marker></defs><rect class="bg" width="1900" height="1240"/><text class="h" x="50" y="52"><tspan class="a">◖S◗</tspan> PRIMARY END-TO-END JOURNEYS</text>
<g id="resume" transform="translate(50 100)"><rect class="p" width="1800" height="160" rx="10"/><text class="s b" x="24" y="34">01 START / RESUME</text><g transform="translate(230 54)"><rect class="n" width="210" height="58" rx="6"/><text class="t" x="20" y="35">Choose workspace</text><path class="l" marker-end="url(#m)" d="M210 29H270"/><rect class="n" x="280" width="210" height="58" rx="6"/><text class="t" x="300" y="35">Resolve session</text><path class="l" marker-end="url(#m)" d="M490 29H550"/><rect class="n" x="560" width="210" height="58" rx="6"/><text class="t" x="580" y="35">Load + reconcile</text><path class="l" marker-end="url(#m)" d="M770 29H830"/><rect class="n" x="840" width="210" height="58" rx="6"/><text class="t" x="860" y="35">Restore draft</text><path class="l" marker-end="url(#m)" d="M1050 29H1110"/><rect class="n" x="1120" width="210" height="58" rx="6"/><text class="g t" x="1140" y="35">Composer ready</text></g></g>
<g id="plan" transform="translate(50 290)"><rect class="p" width="1800" height="160" rx="10"/><text class="s g" x="24" y="34">02 PLAN → EXECUTE</text><text class="t" x="250" y="90">Inspect</text><text class="t" x="480" y="90">Propose</text><text class="t" x="710" y="90">Edit</text><text class="y t" x="940" y="90">Approve</text><text class="b t" x="1170" y="90">Execute</text><text class="g t" x="1410" y="90">Verify / Partial / Blocked</text><path class="l" marker-end="url(#m)" d="M320 85H450M550 85H680M760 85H910M1020 85H1140M1240 85H1380"/></g>
<g id="decision" transform="translate(50 480)"><rect class="p" width="1800" height="160" rx="10"/><text class="s y" x="24" y="34">03 PERMISSION</text><text class="t" x="240" y="90">Request</text><text class="t" x="460" y="90">Queue by risk</text><text class="y t" x="720" y="90">Review exact action</text><text class="t" x="1030" y="90">Decide / remote resolve</text><text class="g t" x="1380" y="90">Audit + resume</text><path class="l" marker-end="url(#m)" d="M310 85H430M560 85H690M870 85H1000M1200 85H1350"/><text class="r s" x="720" y="128">changed action → invalidate → review again</text></g>
<g id="interrupt" transform="translate(50 670)"><rect class="p" width="1800" height="160" rx="10"/><text class="s r" x="24" y="34">04 INTERRUPT</text><text class="t" x="220" y="90">Request stop</text><text class="t" x="470" y="90">Cancel / wait boundary</text><text class="t" x="790" y="90">Reconcile external state</text><text class="y t" x="1110" y="90">Inspect existing changes</text><text class="g t" x="1430" y="90">Replacement turn</text><path class="l" marker-end="url(#m)" d="M330 85H440M640 85H760M970 85H1080M1280 85H1400"/></g>
<g id="reconnect-fork" transform="translate(50 860)"><rect class="p" width="1800" height="300" rx="10"/><text class="s b" x="24" y="34">05 RECONNECT + FORK</text><text class="t" x="210" y="92">Disconnect</text><text class="t" x="430" y="92">Preserve view</text><text class="t" x="670" y="92">Reconnect cursor</text><text class="t" x="940" y="92">Reconcile tools</text><text class="g t" x="1190" y="92">Resume live</text><path class="l" marker-end="url(#m)" d="M300 87H400M540 87H640M800 87H910M1050 87H1160"/><line class="l" x1="900" y1="140" x2="900" y2="260"/><text class="s" x="930" y="174">Fork from checkpoint</text><text class="t" x="1040" y="222">Choose filesystem semantics</text><path class="l" marker-end="url(#m)" d="M1260 217H1350"/><text class="g t" x="1380" y="222">New session + ancestry</text></g></svg>
