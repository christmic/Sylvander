<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1240" viewBox="0 0 1900 1240">
  <title>Sylvander large-scale session management</title><defs><style>.bg{fill:#0B0D0F}.p{fill:#111315;stroke:#343A40}.side{fill:#0D0F11}.t{fill:#ECE7DE;font:14px Menlo,monospace}.h{fill:#ECE7DE;font:700 18px Menlo,monospace}.s{fill:#989B9D;font:12px Menlo,monospace}.x{fill:#666C72;font:11px Menlo,monospace}.a{fill:#E8796A}.b{fill:#75A7E8}.g{fill:#72C7B1}.y{fill:#D9AF62}.r{fill:#E06C75}.line{stroke:#343A40}.sel{fill:#E8796A08}.badge{fill:#1A1E22;stroke:#4A535C}</style></defs><rect class="bg" width="1900" height="1240"/><text class="h" x="50" y="52"><tspan class="a">◖S◗</tspan> SESSION SYSTEM · SCALE + MULTI-VIEW</text>
  <g id="sidebar-scale" transform="translate(50 90)"><rect class="p" width="880" height="1080" rx="10"/><rect class="side" width="360" height="1080" rx="10"/><text class="s a" x="24" y="38">01 · 300+ SESSIONS</text><text class="t" x="24" y="82">⌕ auth  workspace:acme  state:waiting</text><line class="line" x1="24" y1="104" x2="336" y2="104"/><text class="x" x="24" y="142">WAITING FOR YOU · 2</text><g transform="translate(12 162)"><rect class="sel" width="336" height="68" rx="4"/><rect class="a" width="3" height="68"/><text class="y t" x="18" y="28">●</text><text class="t" x="48" y="28">api-review</text><rect class="badge" x="270" y="11" width="48" height="24" rx="12"/><text class="x" text-anchor="middle" x="294" y="28">ASK</text><text class="x" x="48" y="52">approval · acme-api</text></g><text class="r t" x="30" y="270">!</text><text class="t" x="60" y="270">deploy-prod</text><text class="x" x="60" y="292">failed · 1 unread</text><text class="x" x="24" y="344">PINNED</text><text class="b t" x="30" y="384">◐</text><text class="t" x="60" y="384">auth-refactor</text><text class="a" x="322" y="384">•</text><text class="x" x="60" y="406">working · unsent draft</text><text class="g t" x="30" y="454">✓</text><text class="t" x="60" y="454">release-notes</text><text class="x" x="24" y="514">WORKSPACES</text><text class="t" x="24" y="554">▾ acme-api</text><text class="s" x="258" y="554">42</text><text class="s" x="48" y="592">◐ working</text><text class="s" x="48" y="626">● waiting</text><text class="t" x="24" y="674">▸ sylvander</text><text class="s" x="258" y="674">118</text><text class="t" x="24" y="718">▸ archived</text><text class="s" x="258" y="718">167</text><text class="x" x="24" y="1030">virtualized · selection stable</text>
    <g transform="translate(400 42)"><text class="h" y="0">Session detail</text><text class="s" y="38">api-review · linked view in Window 2</text><line class="line" x1="0" y1="60" x2="440" y2="60"/><text class="x" y="104">EXECUTION</text><text class="y t" y="136">● waiting for approval</text><text class="x" y="184">VIEW FLAGS</text><text class="t" y="216">• draft · 3 unread · live-follow off</text><text class="x" y="264">NOTIFICATIONS</text><text class="t" y="296">waiting + failure only</text><text class="x" y="344">WINDOWS</text><text class="t" y="376">Window 1 · selected</text><text class="t" y="408">Window 2 · linked read view</text><line class="line" x1="0" y1="452" x2="440" y2="452"/><text class="s" y="490">Move to window</text><text class="s" y="526">Pin · Archive · Hide view</text><text class="s" y="562">Fork · Export · Delete…</text></g></g>
  <g id="notification-policy" transform="translate(980 90)"><rect class="p" width="870" height="510" rx="10"/><text class="s y" x="26" y="38">02 · NOTIFICATION POLICY</text><text class="h" x="26" y="82">Notify me when…</text><text class="t" x="26" y="130"><tspan class="g">✓</tspan> A session needs approval or an answer</text><text class="t" x="26" y="174"><tspan class="g">✓</tspan> A background session fails</text><text class="t" x="26" y="218"><tspan class="g">✓</tspan> Work longer than 2 minutes completes</text><text class="t" x="26" y="262"><tspan class="x">○</tspan> Any session completes</text><line class="line" x1="26" y1="300" x2="844" y2="300"/><text class="s" x="26" y="340">Active visible session: suppress system notification</text><text class="s" x="26" y="376">Quiet hours: 22:00–08:00 · approvals still badge sidebar</text><text class="s" x="26" y="412">Workspace override: production → always notify failures</text></g>
  <g id="draft-conflict" transform="translate(980 650)"><rect class="p" width="870" height="520" rx="10"/><text class="s r" x="26" y="38">03 · LINKED-VIEW DRAFT CONFLICT</text><text class="h" x="26" y="82">Two drafts exist for api-review</text><text class="x" x="26" y="126">THIS WINDOW · 2 minutes ago</text><text class="t" x="26" y="158">Focus on backward compatibility and migration notes.</text><text class="x" x="26" y="212">WINDOW 2 · just now</text><text class="t" x="26" y="244">Also inspect the deprecated endpoint callers.</text><line class="line" x1="26" y1="282" x2="844" y2="282"/><rect class="sel" x="18" y="304" width="834" height="44" rx="4"/><text class="t" x="34" y="332"><tspan class="a">›</tspan> Keep both as queued prompts</text><text class="t" x="34" y="378">  Compare and merge</text><text class="t" x="34" y="424">  Keep this window only</text><text class="s" x="26" y="484">No silent last-write-wins overwrite</text></g>
</svg>
