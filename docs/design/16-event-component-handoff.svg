<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1320" viewBox="0 0 1900 1320"><title>Sylvander event component implementation handoff</title><defs><style>.bg{fill:#0B0D0F}.p{fill:#111315;stroke:#343A40}.t{fill:#ECE7DE;font:14px Menlo}.h{fill:#ECE7DE;font:700 18px Menlo}.s{fill:#989B9D;font:12px Menlo}.a{fill:#E8796A}.b{fill:#75A7E8}.g{fill:#72C7B1}.y{fill:#D9AF62}.r{fill:#E06C75}.line{stroke:#343A40}.n{fill:#1A1E22;stroke:#4A535C}</style></defs><rect class="bg" width="1900" height="1320"/><text class="h" x="50" y="52"><tspan class="a">◖S◗</tspan> EVENT → COMPONENT IMPLEMENTATION HANDOFF</text>
<g id="matrix" transform="translate(50 90)"><rect class="p" width="1800" height="760" rx="10"/><text class="h" x="26" y="52">Event</text><text class="h" x="390" y="52">Component</text><text class="h" x="760" y="52">Update</text><text class="h" x="1130" y="52">Terminal state</text><text class="h" x="1480" y="52">Recovery</text><line class="line" x1="26" y1="76" x2="1774" y2="76"/>
<text class="b t" x="26" y="122">SessionLoaded</text><text class="t" x="390" y="122">header/transcript/composer</text><text class="s" x="760" y="122">bind then hydrate</text><text class="g s" x="1130" y="122">ready</text><text class="s" x="1480" y="122">retry/read-only</text>
<text class="b t" x="26" y="184">TextDelta</text><text class="t" x="390" y="184">live assistant region</text><text class="s" x="760" y="184">coalesce frames</text><text class="g s" x="1130" y="184">promote on done</text><text class="s" x="1480" y="184">cursor dedupe</text>
<text class="b t" x="26" y="246">ToolCall/Progress</text><text class="t" x="390" y="246">tool rhythm</text><text class="s" x="760" y="246">stable call ID</text><text class="y s" x="1130" y="246">result/interrupted/orphan</text><text class="s" x="1480" y="246">inspect via agent</text>
<text class="b t" x="26" y="308">ApprovalRequired</text><text class="t" x="390" y="308">decision + sidebar</text><text class="s" x="760" y="308">dependency queue</text><text class="y s" x="1130" y="308">approved/denied/expired</text><text class="s" x="1480" y="308">new request if changed</text>
<text class="b t" x="26" y="370">AskUser</text><text class="t" x="390" y="370">answer decision</text><text class="s" x="760" y="370">preserve options</text><text class="g s" x="1130" y="370">answered/deferred</text><text class="s" x="1480" y="370">resume after reconnect</text>
<text class="b t" x="26" y="432">PlanUpdated</text><text class="t" x="390" y="432">inline plan</text><text class="s" x="760" y="432">stable step ID diff</text><text class="g s" x="1130" y="432">approved/replaced</text><text class="s" x="1480" y="432">renew material approval</text>
<text class="b t" x="26" y="494">ContextUpdated</text><text class="t" x="390" y="494">status/context inspect</text><text class="s" x="760" y="494">throttled metrics</text><text class="y s" x="1130" y="494">compacted/failure</text><text class="s" x="1480" y="494">preview/switch/fork</text>
<text class="b t" x="26" y="556">ConnectionChanged</text><text class="t" x="390" y="556">banner/sidebar</text><text class="s" x="760" y="556">preserve view</text><text class="r s" x="1130" y="556">connected/offline/failed</text><text class="s" x="1480" y="556">backoff/diagnostics</text>
<text class="b t" x="26" y="618">SessionCompleted</text><text class="t" x="390" y="618">evidence/sidebar</text><text class="s" x="760" y="618">promote result</text><text class="g s" x="1130" y="618">verified/partial/blocked</text><text class="s" x="1480" y="618">continue new turn</text><line class="line" x1="26" y1="664" x2="1774" y2="664"/><text class="s" x="26" y="708">Stable IDs + idempotent updates. Silence and socket close never imply completion.</text></g>
<g id="qa" transform="translate(50 900)"><rect class="p" width="1800" height="350" rx="10"/><text class="s a" x="26" y="38">DESIGN QA · REPLAYABLE SCENARIOS</text><text class="t" x="26" y="82">✓ IME Enter commits candidate and sends nothing</text><text class="t" x="26" y="122">✓ 100 streaming events preserve historical scroll + selection</text><text class="t" x="26" y="162">✓ Changed command invalidates approval before execution</text><text class="t" x="26" y="202">✓ Reconnect overlap creates no duplicate delta or tool row</text><text class="t" x="26" y="242">✓ 300 session updates do not move selected sidebar row</text><text class="t" x="920" y="82">✓ 40-column monochrome approval retains action + risk</text><text class="t" x="920" y="122">✓ Linked drafts never overwrite silently</text><text class="t" x="920" y="162">✓ Non-interruptible action delays replacement safely</text><text class="t" x="920" y="202">✓ Screen-reader mode avoids rewrite animation</text><text class="t" x="920" y="242">✓ Crash recovery restores terminal + durable cursor</text></g></svg>
