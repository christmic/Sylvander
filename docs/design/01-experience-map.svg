<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100">
  <title>Sylvander product experience map</title>
  <defs><style>.bg{fill:#0B0D0F}.node{fill:#111315;stroke:#343A40;stroke-width:1}.primary{fill:#111315;stroke:#E8796A;stroke-width:2}.t{fill:#ECE7DE;font:16px Menlo,monospace}.h{fill:#ECE7DE;font:700 23px Menlo,monospace}.s{fill:#989B9D;font:13px Menlo,monospace}.l{stroke:#4A535C;stroke-width:1.5;fill:none}.a{fill:#E8796A}.b{fill:#75A7E8}.g{fill:#72C7B1}</style><marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#4A535C"/></marker></defs>
  <rect class="bg" width="1800" height="1100"/><text class="h" x="60" y="70"><tspan class="a">◖S◗</tspan> SYLVANDER · EXPERIENCE MAP</text><text class="s" x="60" y="98">one agent system · one terminal-native conversation · two presentation environments</text>
  <g id="user-intent"><rect class="node" x="60" y="175" width="300" height="150" rx="10"/><text class="h" x="90" y="220">User intent</text><text class="s" x="90" y="255">prompt · steer · approve</text><text class="s" x="90" y="281">inspect · resume · interrupt</text></g>
  <g id="standalone"><rect class="primary" x="500" y="135" width="480" height="230" rx="12"/><text class="h" x="535" y="185">Standalone TUI</text><text class="t" x="535" y="225">immersive transcript</text><text class="t" x="535" y="255">composer + decisions</text><text class="t" x="535" y="285">session switcher overlay</text><text class="s" x="535" y="325">Ghostty · iTerm · Kitty · WezTerm</text></g>
  <g id="desktop"><rect class="primary" x="1120" y="135" width="600" height="230" rx="12"/><text class="h" x="1155" y="185">Ghostty desktop workspace</text><text class="t" x="1155" y="225">left session sidebar</text><text class="t" x="1155" y="255">active PTY hosts the same TUI</text><text class="t" x="1155" y="285">focus mode collapses sidebar</text><text class="s" x="1155" y="325">native shell never renders conversation</text></g>
  <path class="l" marker-end="url(#arrow)" d="M360 230H490"/><path class="l" marker-end="url(#arrow)" d="M360 270C700 420 1040 420 1210 365"/>
  <g id="public-protocol"><rect class="node" x="640" y="475" width="560" height="130" rx="10"/><text class="h" x="675" y="520">Public UI protocol</text><text class="s" x="675" y="555">ClientCommand ⇄ ServerEvent</text><text class="s" x="675" y="580">transport-neutral · versioned · resumable</text></g>
  <path class="l" marker-end="url(#arrow)" d="M740 365V465"/><path class="l" marker-end="url(#arrow)" d="M1420 365C1420 445 1200 445 1120 475"/>
  <g id="server"><rect class="node" x="540" y="715" width="760" height="250" rx="12"/><text class="h" x="575" y="765">Sylvander server</text><text class="t" x="575" y="810"><tspan class="b">agent runtime</tspan> · tools · approvals · tasks</text><text class="t" x="575" y="850"><tspan class="g">durable sessions</tspan> · history · drafts · workspace</text><text class="t" x="575" y="890">background execution continues across views</text><text class="s" x="575" y="930">Ghostty sidebar item and ordinary terminal are views, not owners</text></g>
  <path class="l" marker-end="url(#arrow)" d="M920 605V705"/>
  <g id="principles" transform="translate(1380 690)"><text class="h" y="0">Design laws</text><text class="s" y="44">01 conversation before machinery</text><text class="s" y="76">02 no gray transcript cards</text><text class="s" y="108">03 risk beside the decision</text><text class="s" y="140">04 session survives its view</text><text class="s" y="172">05 evidence at completion</text><text class="s" y="204">06 graceful terminal fallback</text></g>
</svg>
